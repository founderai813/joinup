  import { getFirestore, doc, getDoc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyA7drKkcTJ8Tr-to422Sh_r_SLz52ASJb0",
    authDomain: "joinup-a4e3d.firebaseapp.com",
    projectId: "joinup-a4e3d",
    storageBucket: "joinup-a4e3d.firebasestorage.app",
    messagingSenderId: "252645221802",
    appId: "1:252645221802:web:6d789d18a38e55c12d37d3"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db; window._fbReady = true;

  window.dbSet = async (col, id, data) => { try { await setDoc(doc(db,col,id),data); return true; } catch(e){return false;} };

</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const DAYS_SHORT = ["一","二","三","四","五","六","日"];
const COLORS = ["#FF6B6B","#4ECDC4","#45B7D1","#96CEB4","#FFEAA7","#DDA0DD","#98D8C8","#F7DC6F","#82E0AA","#F1948A"];
const TIME_SLOTS = [
  { key:"morning",   label:"早上", time:"09:00–12:00", color:"#fbbf24" },
  { key:"lunch",     label:"午餐", time:"12:00–14:00", color:"#f97316" },
  { key:"afternoon", label:"下午", time:"14:00–17:00", color:"#34d399" },
  { key:"dinner",    label:"晚餐", time:"17:00–19:00", color:"#a78bfa" },
  { key:"evening",   label:"晚上", time:"19:00–21:00", color:"#38bdf8" },
];
const CATEGORIES = [
  { key:"food",    label:"🍽 聚餐", color:"#f97316" },
  { key:"sport",   label:"🏃 運動", color:"#34d399" },
  { key:"travel",  label:"✈️ 旅遊", color:"#38bdf8" },
  { key:"game",    label:"🎲 桌遊", color:"#a78bfa" },
  { key:"study",   label:"📚 學習", color:"#fbbf24" },
  { key:"other",   label:"📌 其他", color:"#6b8aa8" },
];
const getCategory=(k)=>CATEGORIES.find(c=>c.key===k)||CATEGORIES[5];
// CSV 匯出工具
const downloadCSV=(filename,rows)=>{
  const csv=rows.map(r=>r.map(c=>{
    const s=String(c==null?"":c).replace(/"/g,'""');
    return /[",\n]/.test(s)?`"${s}"`:s;
  }).join(",")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
};
const ls = {
  get:(k)=>{try{const v=localStorage.getItem("ju_"+k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem("ju_"+k,JSON.stringify(v));}catch{}},
};
const DB = {
  get: async(col,id)=>{ if(window._fbReady){const d=await window.dbGet(col,id);if(d)return d;} return ls.get(col+"_"+id); },
  set: async(col,id,data)=>{ ls.set(col+"_"+id,data); if(window._fbReady)await window.dbSet(col,id,data); },
  del: async(col,id)=>{ if(window._fbReady)await window.dbDel(col,id); },
};
const fmt=(d)=>d?new Date(d).toLocaleDateString("zh-TW"):"—";
const isValidEmail=(e)=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

// Google Calendar 匯出
const exportToGCal = (title, date, timeLabel, timeRange, location) => {
  const slot = TIME_SLOTS.find(s=>s.label===timeLabel);
  const [startH, endH] = timeRange ? timeRange.split("–").map(t=>t.trim()) : ["09:00","10:00"];
  const dateStr = date.replace(/-/g,"");
  const toTime=(t)=>t.replace(":","")+"00";
  const start = dateStr+"T"+toTime(startH);
  const end   = dateStr+"T"+toTime(endH);
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${start}/${end}&location=${encodeURIComponent(location||"")}&details=${encodeURIComponent("由 JoinUp 揪團神器建立")}`;
  window.open(url,"_blank");
};

// SlotPicker
function SlotPicker({ dates, mySlots={}, setMySlots=()=>{}, organizerSlots={}, otherJoiners={}, readOnly=false, countMap={}, maxCount=1, intersect={}, joiners={} }) {
  const [popup, setPopup] = useState(null);
  const [weekPage, setWeekPage] = useState(0);
  const weeks = dates?(()=>{const w=[];for(let i=0;i<dates.length;i+=7)w.push(dates.slice(i,i+7));return w;})():null;
  const totalWeeks = weeks?weeks.length:1;
  const pageW = weeks?weeks[weekPage]:null;
  const diOffset = weekPage*7;
  const cols = pageW?pageW.length:7;
  const headers = pageW
    ?pageW.map(d=>{const dt=new Date(d);return{top:`${dt.getMonth()+1}/${dt.getDate()}`,bot:DAYS_SHORT[dt.getDay()===0?6:dt.getDay()-1]};})
    :DAYS_SHORT.map(d=>({top:d,bot:""}));
  const otherNames=Object.keys(otherJoiners);
  const otherCnt=(key)=>otherNames.filter(n=>otherJoiners[n].slots?.[key]).length;
  const handleClick=(localDi,sk)=>{
    const globalDi=dates?diOffset+localDi:localDi, key=`${globalDi}-${sk}`;
    if(readOnly){
      const cnt=countMap[key]||0; if(cnt===0){setPopup(null);return;}
      const slot=TIME_SLOTS.find(s=>s.key===sk), d=dates?dates[globalDi]:null;
      const dateLabel=d?(()=>{const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}(${DAYS_SHORT[dt.getDay()===0?6:dt.getDay()-1]})`;})():`週${DAYS_SHORT[globalDi]}`;
      const canNames=Object.keys(joiners).filter(n=>joiners[n].slots?.[key]);
      const cannotNames=Object.keys(joiners).filter(n=>!joiners[n].slots?.[key]);
      setPopup(popup?.key===key?null:{key,slot,dateLabel,canNames,cannotNames}); return;
    }
    setMySlots(p=>{const n={...p};if(n[key])delete n[key];else n[key]=true;return n;}); setPopup(null);
  };
  const getCellStyle=(key)=>{
    if(readOnly){
      const cnt=countMap[key]||0,isX=intersect[key];
      if(isX&&maxCount>1)return{bg:"#38bdf8",border:"1px solid #7dd3fc",text:"#fff"};
      if(cnt>0){const r=cnt/maxCount;return{bg:`rgba(56,189,248,${0.18+r*0.5})`,border:"1px solid transparent",text:"#fff"};}
      return{bg:"#1e2d45",border:"1px solid transparent",text:"transparent"};
    }
    const isMine=!!mySlots[key],isOrg=!!organizerSlots[key],others=otherCnt(key);
    const badge=others>0?`+${others}`:null;
    if(isMine)return isOrg?{bg:"#22c55e",border:"2px solid #4ade80",text:"#fff",badge}:{bg:"#16a34a",border:"2px solid #22c55e",text:"#fff",badge};
    if(isOrg)return others>0?{bg:"#0f3460",border:"2px solid #38bdf8",text:"#fbbf24",badge:`+${others}`}:{bg:"#0c2a4a",border:"2px solid #38bdf8",text:"transparent",badge:null};
    if(others>0)return{bg:"#2a1a0a",border:"2px solid #f97316",text:"#fb923c",badge:`+${others}`};
    return{bg:"#1a2535",border:"1px solid #2a3f5a",text:"transparent",badge:null};
  };
  return (
    <div style={{userSelect:"none"}}>
      {weeks&&totalWeeks>1&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,gap:8}}>
          <button onClick={()=>{setWeekPage(p=>Math.max(0,p-1));setPopup(null);}} disabled={weekPage===0} style={{background:"#1e2d45",border:"none",borderRadius:7,padding:"7px 14px",color:weekPage===0?"#374a5e":"#dde8f5",cursor:weekPage===0?"default":"pointer",fontWeight:700,fontSize:13,flexShrink:0}}>← 上週</button>
          <span style={{fontSize:12,color:"#6b8aa8",textAlign:"center",lineHeight:1.5}}>第 {weekPage+1}/{totalWeeks} 週<br/><span style={{color:"#374a5e",fontSize:11}}>{pageW?.[0]?`${new Date(pageW[0]).getMonth()+1}/${new Date(pageW[0]).getDate()}`:""}{pageW?.length>1?` ~ ${new Date(pageW[pageW.length-1]).getMonth()+1}/${new Date(pageW[pageW.length-1]).getDate()}`:""}</span></span>
          <button onClick={()=>{setWeekPage(p=>Math.min(totalWeeks-1,p+1));setPopup(null);}} disabled={weekPage===totalWeeks-1} style={{background:"#1e2d45",border:"none",borderRadius:7,padding:"7px 14px",color:weekPage===totalWeeks-1?"#374a5e":"#dde8f5",cursor:weekPage===totalWeeks-1?"default":"pointer",fontWeight:700,fontSize:13,flexShrink:0}}>下週 →</button>
        </div>
      )}
      <div>
        <div style={{display:"grid",gridTemplateColumns:`80px repeat(${cols},1fr)`,gap:4,marginBottom:6}}>
          <div/>{headers.map((h,i)=><div key={i} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#6b8aa8",lineHeight:1.5}}>{h.top}{h.bot&&<><br/>{h.bot}</>}</div>)}
        </div>
        {TIME_SLOTS.map(slot=>(
          <div key={slot.key} style={{display:"grid",gridTemplateColumns:`80px repeat(${cols},1fr)`,gap:4,marginBottom:5}}>
            <div style={{display:"flex",flexDirection:"column",justifyContent:"center",paddingRight:6}}>
              <span style={{fontSize:12,fontWeight:700,color:slot.color}}>{slot.label}</span>
              <span style={{fontSize:10,color:"#374a5e"}}>{slot.time}</span>
            </div>
            {Array.from({length:cols},(_,localDi)=>{
              const globalDi=dates?diOffset+localDi:localDi,key=`${globalDi}-${slot.key}`;
              const isActive=popup?.key===key,cs=getCellStyle(key);
              const cnt=readOnly?(countMap[key]||0):null;
              const displayText=readOnly?(cnt>0?`${cnt}/${maxCount}`:""):(cs.badge||"");
              return(<div key={localDi} onClick={()=>handleClick(localDi,slot.key)} style={{height:40,borderRadius:8,background:cs.bg,border:isActive?"2px solid #fff":cs.border,cursor:"pointer",transition:"all .12s",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:isActive?"#fff":cs.text,transform:isActive?"scale(0.92)":"scale(1)"}}>{displayText}</div>);
            })}
          </div>
        ))}
      </div>
      {!readOnly&&(
        <div style={{marginTop:10,background:"#0b1523",borderRadius:8,padding:"8px 12px"}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px 16px",marginBottom:4}}>
            {[["#1a2535","1px solid #2a3f5a","沒人"],["#0c2a4a","2px solid #38bdf8","主揪可以"],["#22c55e","2px solid #4ade80","我可以"],["#2a1a0a","2px solid #f97316","其他人填了"]].map(([bg,border,label])=>(
              <span key={label} style={{fontSize:11,display:"flex",alignItems:"center",gap:4}}><span style={{width:14,height:14,borderRadius:3,background:bg,border,display:"inline-block"}}/>{label}</span>
            ))}
          </div>
          <div style={{fontSize:10,color:"#374a5e"}}>點擊格子選取 / 取消</div>
        </div>
      )}
      {readOnly&&<div style={{marginTop:6,fontSize:11,color:"#374a5e"}}>點擊格子查看誰可以參加</div>}
      {popup&&(
        <div style={{marginTop:12,background:"#080d18",border:`1px solid ${popup.slot.color}55`,borderRadius:12,padding:16,position:"relative"}}>
          <button onClick={()=>setPopup(null)} style={{position:"absolute",top:10,right:12,background:"transparent",border:"none",color:"#6b8aa8",cursor:"pointer",fontSize:18}}>✕</button>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}><span style={{color:popup.slot.color}}>●</span> {popup.dateLabel} <span style={{color:popup.slot.color}}>{popup.slot.label}</span><span style={{fontSize:12,color:"#6b8aa8",marginLeft:6}}>（{popup.slot.time}）</span></div>
          {popup.canNames.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:11,color:"#34d399",fontWeight:700,marginBottom:6}}>✅ 可以（{popup.canNames.length}人）</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{popup.canNames.map((n,i)=><span key={n} style={{background:COLORS[i%COLORS.length]+"33",border:`1px solid ${COLORS[i%COLORS.length]}66`,borderRadius:7,padding:"4px 12px",fontSize:13,color:COLORS[i%COLORS.length],fontWeight:700}}>{n}</span>)}</div></div>}
          {popup.cannotNames.length>0&&<div><div style={{fontSize:11,color:"#6b8aa8",fontWeight:700,marginBottom:6}}>❌ 不行（{popup.cannotNames.length}人）</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{popup.cannotNames.map(n=><span key={n} style={{background:"#1e2d45",border:"1px solid #2a3f5a",borderRadius:7,padding:"4px 12px",fontSize:13,color:"#5a7a9a"}}>{n}</span>)}</div></div>}
        </div>
      )}
    </div>
  );
}

// ── App ──
function App() {
  const [tab, setTab] = useState("home");
  const [toast, setToast] = useState("");
  const [groups, setGroups] = useState({});
  const [wishes, setWishes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [fbReady, setFbReady] = useState(false);
  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2800);};

  useEffect(()=>{
    const init=async()=>{
      const g=await DB.get("app","groups"); if(g?.data)setGroups(g.data);
      const w=await DB.get("app","wishes"); if(w?.data)setWishes(w.data);
      setLoading(false);
    };
    const onReady=()=>{setFbReady(true);init();};
    if(window._fbReady){setFbReady(true);init();}
    else{window.addEventListener("firebase-ready",onReady);init();}
    return()=>window.removeEventListener("firebase-ready",onReady);
  },[]);

  const saveGroups=async(next)=>{setGroups(next);await DB.set("app","groups",{data:next,updatedAt:Date.now()});};
  const saveWishes=async(next)=>{setWishes(next);await DB.set("app","wishes",{data:next,updatedAt:Date.now()});};

  const getDates=(group)=>{
    if(!group?.dateStart)return null;
    const start=new Date(group.dateStart),end=group.dateEnd?new Date(group.dateEnd):start,ds=[];
    for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))ds.push(new Date(d).toISOString().slice(0,10));
    return ds.slice(0,90);
  };

  const buildCountMap=(joiners,dates)=>{
    const names=Object.keys(joiners),countMap={},intersect={};
    if(names.length===0)return{countMap,intersect};
    const cols=dates?dates.length:7;
    TIME_SLOTS.forEach(slot=>{Array.from({length:cols},(_,di)=>{
      const key=`${di}-${slot.key}`,cnt=names.filter(n=>joiners[n].slots?.[key]).length;
      if(cnt>0){countMap[key]=cnt;if(cnt===names.length)intersect[key]=true;}
    });});
    return{countMap,intersect};
  };

  const S={
    root:{minHeight:"100vh",background:"#080d18",paddingBottom:80},
    topbar:{background:"#0f1729",borderBottom:"1px solid #1e2d45",padding:"18px 20px 0"},
    title:{margin:"0 0 14px",fontSize:22,fontWeight:900,fontFamily:"'Syne',sans-serif",background:"linear-gradient(90deg,#38bdf8,#818cf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"},
    nav:{display:"flex",gap:1,overflowX:"auto"},
    navBtn:(a)=>({padding:"12px 15px",border:"none",background:"transparent",color:a?"#38bdf8":"#6b8aa8",cursor:"pointer",fontWeight:a?700:500,fontSize:13,borderBottom:a?"2px solid #38bdf8":"2px solid transparent",whiteSpace:"nowrap",transition:"all .15s"}),
    card:{background:"#0f1729",border:"1px solid #1e2d45",borderRadius:14,padding:22,margin:"16px auto",maxWidth:740},
    label:{display:"block",fontSize:11,color:"#6b8aa8",marginBottom:5,fontWeight:700,letterSpacing:.6,textTransform:"uppercase"},
    input:{width:"100%",boxSizing:"border-box",background:"#080d18",border:"1px solid #1e2d45",borderRadius:8,padding:"10px 14px",color:"#dde8f5",fontSize:14,outline:"none"},
    textarea:{width:"100%",boxSizing:"border-box",background:"#080d18",border:"1px solid #1e2d45",borderRadius:8,padding:"10px 14px",color:"#dde8f5",fontSize:14,outline:"none",resize:"vertical",minHeight:72},
    btn:(v="primary")=>({padding:"10px 20px",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,transition:"all .15s",
      background:v==="primary"?"linear-gradient(90deg,#38bdf8,#0ea5e9)":v==="success"?"linear-gradient(90deg,#34d399,#10b981)":v==="danger"?"#dc2626":v==="warning"?"#d97706":v==="ghost"?"transparent":"#1e2d45",
      color:v==="ghost"?"#6b8aa8":"#fff",border:v==="ghost"?"1px solid #1e2d45":"none"}),
    badge:(c="#38bdf8")=>({display:"inline-block",background:c+"22",border:`1px solid ${c}55`,borderRadius:6,padding:"2px 10px",fontSize:12,color:c,fontWeight:700}),
    sT:{fontSize:18,fontWeight:800,fontFamily:"'Syne',sans-serif",margin:"0 0 16px",color:"#e2f0ff"},
    hr:{borderTop:"1px solid #1e2d45",margin:"14px 0"},
    g2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14},
    g3:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:14},
    hint:{fontSize:11,color:"#374a5e",marginTop:3},
  };
  const F=({label,required,hint,children})=>(
    <div><label style={S.label}>{label}{required&&<span style={{color:"#f87171"}}> *</span>}{hint&&<span style={{fontSize:10,color:"#374a5e",fontWeight:400,marginLeft:6,textTransform:"none"}}>{hint}</span>}</label>{children}</div>
  );

  // ── HOME ──
  const HomeTab=()=>{
    const [showGuide,setShowGuide]=useState(false);
    const [myEmail,setMyEmail]=useState("");
    const [myResults,setMyResults]=useState(null);
    const queryMine=()=>{
      const em=myEmail.trim().toLowerCase();
      if(!em||!isValidEmail(em)){showToast("❗ 請輸入有效信箱");return;}
      const results=[];
      Object.keys(groups).forEach(id=>{
        const g=groups[id];
        if((g.email||"").toLowerCase()===em){
          results.push({id,g,role:"organizer",name:g.name});
        }
        Object.keys(g.joiners||{}).forEach(n=>{
          if((g.joiners[n].email||"").toLowerCase()===em){
            results.push({id,g,role:"joiner",name:n});
          }
        });
      });
      setMyResults(results);
    };

    return(<div style={{padding:"0 10px"}}>
      {/* 使用教學 */}
      <div style={{...S.card,marginBottom:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setShowGuide(p=>!p)}>
          <h2 style={{...S.sT,margin:0}}>📖 使用教學 & 注意事項</h2>
          <span style={{color:"#38bdf8",fontSize:14}}>{showGuide?"▲ 收起":"▼ 展開"}</span>
        </div>
        {showGuide&&(
          <div style={{marginTop:16}}>
            <div style={{marginBottom:16}}>
              {[
                {icon:"🚀",title:"開團中",desc:"建立活動，設定日期、人數、費用，選限定或開放團，分享編號給朋友"},
                {icon:"📋",title:"報名活動",desc:"在報名活動頁面點選活動，填寫姓名、信箱、可用時間，送出報名"},
                {icon:"🔐",title:"團主管理",desc:"輸入開團編號+密碼，管理跟團者、確定活動時間、標記已成團"},
                {icon:"🛡",title:"網頁管理員",desc:"使用管理員密碼登入，查看所有活動數據、刪除違規內容"},
                {icon:"🌟",title:"許願池",desc:"投入想玩的活動點子，其他人可以按讚支持，熱門願望顯示在首頁"},
                {icon:"📅",title:"Google Calendar",desc:"成團後開團者確定時間，所有參加者可一鍵匯出到 Google 行事曆"},
              ].map(({icon,title,desc})=>(
                <div key={title} style={{fontSize:13,color:"#6b8aa8",marginBottom:8,lineHeight:1.6}}>
                  {icon} <span style={{fontWeight:700,color:"#38bdf8"}}>{title}</span>：{desc}
                </div>
              ))}
            </div>
            <div style={{background:"#1a0a0a",border:"1px solid #f8717133",borderRadius:10,padding:14}}>
              <div style={{fontWeight:700,color:"#f87171",marginBottom:8,fontSize:13}}>⚠ 注意事項</div>

  // ── REGISTER（報名活動）──
  const RegisterTab=()=>{
    const [search,setSearch]=useState("");
    const [filterCat,setFilterCat]=useState("all");
    const matches=(id)=>{
      const g=groups[id];
      const q=search.trim().toLowerCase();
      if(q){
        const hay=`${id} ${g.activityName||""} ${g.name||""} ${g.location||""} ${g.description||""}`.toLowerCase();
        if(!hay.includes(q))return false;
      }
      if(filterCat!=="all"&&(g.category||"other")!==filterCat)return false;
      return true;
    };
    const allIds=Object.keys(groups).filter(matches);
    const activeIds=allIds.filter(id=>groups[id].status!=="confirmed"||groups[id].confirmed?.allowJoin!==false);
    const confirmedIds=allIds.filter(id=>groups[id].status==="confirmed");

    const ActivityCard=({id,g,i})=>{
      const jc=Object.keys(g.joiners||{}).length;
      const maxP=g.maxPeople?parseInt(g.maxPeople):null;
      const joinerLimit=maxP?maxP-1:null;
      const isFull=joinerLimit&&jc>=joinerLimit;
      const isConfirmed=g.status==="confirmed";
      return(
        <div onClick={()=>setTab("view-"+id)} style={{background:"#080d18",border:`1px solid ${isConfirmed?"#34d39944":"#1e2d45"}`,borderRadius:12,padding:16,marginBottom:10,cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={S.badge(COLORS[i%COLORS.length])}># {id}</span>
              <span style={{fontWeight:800,fontSize:15}}>{g.activityName}</span>
              {g.category&&(()=>{const c=getCategory(g.category);return <span style={{background:c.color+"22",border:`1px solid ${c.color}55`,borderRadius:6,padding:"2px 8px",fontSize:11,color:c.color,fontWeight:700}}>{c.label}</span>;})()}
              {isConfirmed&&<span style={{background:"#34d39922",border:"1px solid #34d39955",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#34d399",fontWeight:700}}>✅ 已成團</span>}
              {isFull&&!isConfirmed&&<span style={{background:"#dc262622",border:"1px solid #dc262655",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#f87171",fontWeight:700}}>額滿</span>}
              {g.groupType==="private"&&<span style={{background:"#a78bfa22",border:"1px solid #a78bfa55",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#a78bfa",fontWeight:700}}>🔒 限定</span>}
            </div>

          <div style={{marginTop:6,fontSize:12,color:"#8aaac8"}}>
            👤 {g.name} &nbsp;|&nbsp; 🙋 <span style={{color:isFull?"#f87171":"#8aaac8"}}>{jc}{joinerLimit?`/${joinerLimit}`:""}人</span>
            {g.location&&<> &nbsp;|&nbsp; 📍 {g.location}</>}{g.cost&&<> &nbsp;|&nbsp; 💰 {g.cost}</>}
          </div>
          {isConfirmed&&g.confirmed?.finalDate&&(
            <div style={{marginTop:6,fontSize:12,color:"#34d399"}}>📅 確定時間：{g.confirmed.finalDate} {g.confirmed.finalSlot}</div>
          )}
        </div>
      );
    };

    return(<div style={{padding:"0 10px"}}>
      {/* 搜尋與篩選 */}
      <div style={S.card}>
        <F label="🔍 搜尋活動"><input style={S.input} placeholder="輸入活動名稱、主揪、地點、編號…" value={search} onChange={e=>setSearch(e.target.value)}/></F>
        <div style={{marginTop:10}}>
          <label style={S.label}>分類篩選</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            <div onClick={()=>setFilterCat("all")} style={{padding:"6px 12px",borderRadius:8,border:`2px solid ${filterCat==="all"?"#38bdf8":"#1e2d45"}`,background:filterCat==="all"?"#0c2a4a":"#080d18",cursor:"pointer",fontSize:12,fontWeight:700,color:filterCat==="all"?"#38bdf8":"#6b8aa8"}}>全部</div>
            {CATEGORIES.map(c=>(
              <div key={c.key} onClick={()=>setFilterCat(c.key)} style={{padding:"6px 12px",borderRadius:8,border:`2px solid ${filterCat===c.key?c.color:"#1e2d45"}`,background:filterCat===c.key?c.color+"22":"#080d18",cursor:"pointer",fontSize:12,fontWeight:700,color:filterCat===c.key?c.color:"#6b8aa8"}}>{c.label}</div>
            ))}
          </div>
        </div>
      </div>

      {/* 開團中 */}
      <div style={S.card}>
        <h2 style={S.sT}>🎪 開團中</h2>
        {allIds.filter(id=>groups[id].status!=="confirmed").length===0&&<p style={{color:"#6b8aa8",fontSize:14}}>目前沒有進行中的活動</p>}
        {allIds.filter(id=>groups[id].status!=="confirmed").map((id,i)=><ActivityCard key={id} id={id} g={groups[id]} i={i}/>)}
      </div>

      {/* 已成團 */}
      {confirmedIds.length>0&&(
        <div style={S.card}>
          <h2 style={S.sT}>✅ 已成團</h2>
          {confirmedIds.map((id,i)=><ActivityCard key={id} id={id} g={groups[id]} i={i}/>)}
        </div>
      )}

      {allIds.length===0&&(
        <div style={S.card}>
          <p style={{color:"#6b8aa8",fontSize:14,textAlign:"center"}}>目前還沒有任何活動，<span style={{color:"#38bdf8",cursor:"pointer",fontWeight:700}} onClick={()=>setTab("organizer")}>前往開團 →</span></p>
        </div>
      )}

  // ── ORGANIZER ──
  const OrganizerTab=()=>{
    const [form,setForm]=useState({id:"",password:"",joinPassword:"",name:"",email:"",contact:"",dateStart:"",dateEnd:"",hours:"",location:"",activityName:"",description:"",cost:"",maxPeople:"",groupType:"open",category:"other"});
    const [organizerSlots,setOrganizerSlots]=useState({});
    const [done,setDone]=useState(null);
    const [idErr,setIdErr]=useState("");
    const set=(k,v)=>setForm(p=>({...p,[k]:v}));
    const submit=async()=>{
      if(!form.id.trim()){showToast("❗ 請填寫開團編號");return;}
      if(!form.password.trim()){showToast("❗ 請設定管理密碼");return;}
      if(!form.name.trim()){showToast("❗ 請填寫姓名");return;}
      if(!form.email.trim()||!isValidEmail(form.email)){showToast("❗ 請填寫有效信箱");return;}
      if(!form.activityName.trim()){showToast("❗ 請填寫活動名稱");return;}
      if(form.groupType==="private"&&!form.joinPassword.trim()){showToast("❗ 限定團請設定跟團密碼");return;}
      const id=form.id.trim().toLowerCase();
      if(groups[id]){setIdErr("此編號已被使用");return;}
      setIdErr("");
      const next={...groups,[id]:{...form,id,organizerSlots,joiners:{},createdAt:Date.now(),status:"open"}};
      await saveGroups(next);
      setDone(id); showToast("✅ 開團成功！");
    };
    if(done)return(<div style={S.card}><div style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{fontSize:48}}>🎉</div>
      <h2 style={{...S.sT,textAlign:"center"}}>開團成功！</h2>
      <p style={{color:"#6b8aa8"}}>開團編號：</p>
      <div style={{fontSize:32,fontWeight:900,color:"#38bdf8",letterSpacing:4,fontFamily:"monospace",margin:"10px 0"}}>{done}</div>
      <div style={{background:"#1e0a0a",border:"1px solid #f8717144",borderRadius:8,padding:"10px 16px",margin:"0 auto 16px",maxWidth:360,fontSize:13,color:"#f87171"}}>⚠ 請記住管理密碼！{form.groupType==="private"&&<><br/>跟團密碼：<b>{form.joinPassword}</b></>}</div>
      <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:20}}>
        <button style={S.btn("secondary")} onClick={()=>{setDone(null);setForm({id:"",password:"",joinPassword:"",name:"",email:"",contact:"",dateStart:"",dateEnd:"",hours:"",location:"",activityName:"",description:"",cost:"",maxPeople:"",groupType:"open",category:"other"});setOrganizerSlots({});}}>再開一團</button>
        <button style={S.btn("primary")} onClick={()=>setTab("manage")}>前往管理頁面</button>
      </div>
    </div></div>);
    return(<div style={S.card}>
      <h2 style={S.sT}>🚀 開團中</h2>
      {/* 開放/限定 */}
      <div style={{marginBottom:14}}>
        <label style={S.label}>團的類型 <span style={{color:"#f87171"}}>*</span></label>
        <div style={{display:"flex",gap:10}}>
          {[["open","🌐 開放團","任何人都可以跟團"],["private","🔒 限定團","需要輸入跟團密碼"]].map(([v,label,desc])=>(
            <div key={v} onClick={()=>set("groupType",v)} style={{flex:1,padding:14,borderRadius:10,border:`2px solid ${form.groupType===v?"#38bdf8":"#1e2d45"}`,background:form.groupType===v?"#0c2a4a":"#080d18",cursor:"pointer"}}>
              <div style={{fontWeight:700,fontSize:13,color:form.groupType===v?"#38bdf8":"#dde8f5"}}>{label}</div>
              <div style={{fontSize:11,color:"#6b8aa8",marginTop:3}}>{desc}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={S.g2}>
        <F label="開團編號" required><input style={{...S.input,borderColor:idErr?"#f87171":"#1e2d45"}} placeholder="自訂，例：summer2025" value={form.id} onChange={e=>{set("id",e.target.value);setIdErr("");}}/>{idErr&&<div style={{color:"#f87171",fontSize:11,marginTop:4}}>⚠ {idErr}</div>}</F>
        <F label="管理密碼" required><input type="password" style={S.input} placeholder="開團管理用密碼" value={form.password} onChange={e=>set("password",e.target.value)}/></F>
      </div>
      {form.groupType==="private"&&(
        <div style={{marginBottom:14}}><F label="跟團密碼" required><input style={S.input} placeholder="跟團者需要輸入此密碼" value={form.joinPassword} onChange={e=>set("joinPassword",e.target.value)}/></F></div>
      )}
      <div style={S.g2}>
        <F label="開團者姓名" required><input style={S.input} placeholder="你的名字" value={form.name} onChange={e=>set("name",e.target.value)}/></F>
        <F label="活動名稱" required><input style={S.input} placeholder="例：期末慶功宴" value={form.activityName} onChange={e=>set("activityName",e.target.value)}/></F>
      </div>
      <div style={{marginBottom:14}}>
        <label style={S.label}>活動分類</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {CATEGORIES.map(c=>(
            <div key={c.key} onClick={()=>set("category",c.key)} style={{padding:"8px 14px",borderRadius:8,border:`2px solid ${form.category===c.key?c.color:"#1e2d45"}`,background:form.category===c.key?c.color+"22":"#080d18",cursor:"pointer",fontSize:13,fontWeight:700,color:form.category===c.key?c.color:"#6b8aa8"}}>{c.label}</div>
          ))}
        </div>
      </div>
      <div style={S.g2}>
        <F label="信箱" required hint="僅供活動通知"><input type="email" style={S.input} placeholder="your@email.com" value={form.email} onChange={e=>set("email",e.target.value)}/></F>
        <F label="聯絡方式" hint="選填，如 IG、Line ID"><input style={S.input} placeholder="例：@instagram_id" value={form.contact} onChange={e=>set("contact",e.target.value)}/></F>
      </div>
      <div style={S.g2}>
        <F label="活動開始日期"><input type="date" style={S.input} value={form.dateStart} onChange={e=>set("dateStart",e.target.value)}/></F>
        <F label="活動結束日期"><input type="date" style={S.input} value={form.dateEnd} min={form.dateStart} onChange={e=>set("dateEnd",e.target.value)}/></F>
      </div>
      <div style={S.g3}>
        <F label="預計時數"><input type="number" style={S.input} placeholder="例：3" min={0} value={form.hours} onChange={e=>set("hours",e.target.value)}/></F>
        <F label="活動費用"><input style={S.input} placeholder="例：NT$500" value={form.cost} onChange={e=>set("cost",e.target.value)}/></F>
        <F label="人數上限（含主揪）"><input type="number" style={S.input} placeholder="例：20" min={1} value={form.maxPeople} onChange={e=>set("maxPeople",e.target.value)}/><div style={S.hint}>跟團上限 = 此數字 - 1</div></F>
      </div>
      <div style={{marginBottom:14}}><F label="活動地點"><input style={S.input} placeholder="例：台北市信義區" value={form.location} onChange={e=>set("location",e.target.value)}/></F></div>
      <F label="活動說明"><textarea style={S.textarea} placeholder="詳細描述活動…" value={form.description} onChange={e=>set("description",e.target.value)}/></F>
      <div style={{height:20}}/>
      <div style={{background:"#080d18",border:"1px solid #38bdf833",borderRadius:12,padding:16}}>
        <div style={{fontWeight:700,fontSize:14,color:"#38bdf8",marginBottom:4}}>📅 主揪可以的時間 <span style={{fontSize:11,color:"#374a5e",fontWeight:400}}>(選填)</span></div>
        {form.dateStart?<SlotPicker dates={getDates(form)} mySlots={organizerSlots} setMySlots={setOrganizerSlots}/>:<div style={{fontSize:12,color:"#374a5e",padding:"12px 0"}}>請先填寫活動日期</div>}
      </div>
      <div style={{height:16}}/>
      <button style={{...S.btn("primary"),width:"100%",padding:"13px"}} onClick={submit}>🚀 開團！</button>
    </div>);
  };

  // ── VIEW (活動詳情 + 跟團入口) ──
  const ViewTab=({gid})=>{
    const [localGroup,setLocalGroup]=useState(null);
    const [joinStep,setJoinStep]=useState(0); // 0=看詳情 1=驗證密碼(限定) 2=填資料 3=已成團報名
    const [joinPw,setJoinPw]=useState("");
    const [name,setName]=useState(""),[email,setEmail]=useState(""),[contact,setContact]=useState(""),[slots,setSlots]=useState({}),[note,setNote]=useState("");
    const [submitting,setSubmitting]=useState(false),[done,setDone]=useState(false);

    useEffect(()=>{
      if(window._fbReady&&window.dbListen){
        const unsub=window.dbListen("app","groups",(data)=>{if(data?.data?.[gid])setLocalGroup(data.data[gid]);});
        return unsub;
      }else setLocalGroup(groups[gid]||null);
    },[gid]);

    const group=localGroup||groups[gid];
    if(!group)return<div style={{...S.card,margin:"16px 10px"}}><p style={{color:"#f87171"}}>找不到此活動。</p></div>;

    const joiners=group.joiners||{},names=Object.keys(joiners);
    const dates=getDates(group);
    const hasOrgSlots=group.organizerSlots&&Object.keys(group.organizerSlots).length>0;
    const allParticipants=hasOrgSlots?{[group.name+"（主揪）"]:{slots:group.organizerSlots},...joiners}:joiners;
    const {countMap,intersect}=buildCountMap(allParticipants,dates);
    const totalCount=Object.keys(allParticipants).length;
    const maxP=group.maxPeople?parseInt(group.maxPeople):null;
    const joinerLimit=maxP?maxP-1:null;
    const joinerCount=names.length;
    const isExisting=name.trim()&&!!joiners[name.trim()];
    const isFull=joinerLimit!==null&&joinerCount>=joinerLimit&&!isExisting;
    const isConfirmed=group.status==="confirmed";

    const intersectList=[];
    if(totalCount>1)(dates||DAYS_SHORT).forEach((d,di)=>{
      TIME_SLOTS.forEach(slot=>{
        if(intersect[`${di}-${slot.key}`]){
          const lbl=dates?(()=>{const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}(${DAYS_SHORT[dt.getDay()===0?6:dt.getDay()-1]})`;})():`週${DAYS_SHORT[di]}`;
          intersectList.push({label:`${lbl} ${slot.label}（${slot.time}）`,date:d,slotLabel:slot.label,slotTime:slot.time});
        }
      });
    });

    const submitJoin=async()=>{
      if(!name.trim()){showToast("❗ 請填寫姓名");return;}
      if(!email.trim()||!isValidEmail(email)){showToast("❗ 請填寫有效信箱");return;}
      setSubmitting(true);
      const latestData=await DB.get("app","groups");
      const latest=latestData?.data||groups;
      const latestGroup=latest[gid];
      if(!latestGroup){showToast("❌ 活動不存在");setSubmitting(false);return;}
      const latestJoiners=latestGroup.joiners||{};
      const latestCount=Object.keys(latestJoiners).length;
      const latestIsExisting=!!latestJoiners[name.trim()];
      const latestIsFull=joinerLimit!==null&&latestCount>=joinerLimit&&!latestIsExisting;
      if(latestIsFull){showToast("❌ 很抱歉，名額已滿！");setSubmitting(false);return;}
      const next={...latest,[gid]:{...latestGroup,joiners:{...latestJoiners,[name.trim()]:{slots,note,email,contact,joinedAt:Date.now()}}}};
      await saveGroups(next);
      setDone(true);showToast("✅ 跟團成功！");setSubmitting(false);
    };

    const submitRegister=async()=>{
      if(!name.trim()){showToast("❗ 請填寫姓名");return;}
      if(!email.trim()||!isValidEmail(email)){showToast("❗ 請填寫有效信箱");return;}
      if(!contact.trim()){showToast("❗ 請填寫聯絡方式");return;}
      setSubmitting(true);
      const latestData=await DB.get("app","groups");
      const latest=latestData?.data||groups;
      const latestGroup=latest[gid];
      const latestJoiners=latestGroup.joiners||{};
      const next={...latest,[gid]:{...latestGroup,joiners:{...latestJoiners,[name.trim()]:{email,contact,registeredAt:Date.now(),isRegistered:true}}}};
      await saveGroups(next);
      setDone(true);showToast("✅ 報名成功！");setSubmitting(false);
    };

    if(done)return(<div style={{...S.card,margin:"16px 10px"}}><div style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{fontSize:48}}>{isConfirmed?"🎉":"🙌"}</div>
      <h2 style={{...S.sT,textAlign:"center"}}>{isConfirmed?"報名成功！":"跟團成功！"}</h2>
      <p style={{color:"#6b8aa8",marginBottom:16}}>{isConfirmed?"已報名，等開團者通知！":"已送出可用時間！"}</p>
      {isConfirmed&&group.confirmed?.finalDate&&(
        <button style={{...S.btn("success"),marginBottom:10}} onClick={()=>exportToGCal(group.activityName,group.confirmed.finalDate,group.confirmed.finalSlot,TIME_SLOTS.find(s=>s.label===group.confirmed.finalSlot)?.time,group.confirmed.finalLocation||group.location)}>📅 加入 Google Calendar</button>
      )}
      <div><button style={S.btn("ghost")} onClick={()=>{setDone(false);setJoinStep(0);setName("");setEmail("");setContact("");setSlots({});setNote("");}}>← 返回活動</button></div>
    </div></div>);

    return(<div style={{margin:"16px 10px"}}>
      {/* 活動資訊卡 */}
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <h2 style={{...S.sT,margin:0}}>{group.activityName}</h2>
            {isConfirmed&&<span style={{background:"#34d39922",border:"1px solid #34d39955",borderRadius:6,padding:"3px 10px",fontSize:12,color:"#34d399",fontWeight:700}}>✅ 已成團</span>}
          </div>
          <span style={S.badge()}># {gid}</span>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"5px 14px",fontSize:12,color:"#8aaac8",marginBottom:10}}>
          <span>👤 {group.name}</span>
          {group.email&&<span>📧 {group.email}</span>}
          {group.contact&&<span>📱 {group.contact}</span>}
          {group.dateStart&&<span>📅 {fmt(group.dateStart)}{group.dateEnd&&group.dateEnd!==group.dateStart?` ～ ${fmt(group.dateEnd)}`:""}</span>}
          {group.hours&&<span>⏱ {group.hours}h</span>}
          {group.location&&<span>📍 {group.location}</span>}
          {group.cost&&<span>💰 {group.cost}</span>}
          {maxP&&<span>👥 上限{maxP}人</span>}
          {group.category&&(()=>{const c=getCategory(group.category);return <span style={{color:c.color}}>{c.label}</span>;})()}
        </div>
        {group.description&&<p style={{fontSize:12,color:"#6b8aa8",marginBottom:10}}>{group.description}</p>}

        {/* 費用分攤計算 */}
        {group.cost&&(()=>{
          const n=parseInt(String(group.cost).replace(/[^\d]/g,""));
          const totalPeople=1+Object.keys(group.joiners||{}).length;
          if(!n||totalPeople<1)return null;
          const per=Math.ceil(n/totalPeople);
          return(
            <div style={{background:"#080d18",border:"1px solid #fbbf2433",borderRadius:10,padding:12,marginBottom:10}}>
              <div style={{fontSize:12,color:"#fbbf24",fontWeight:700,marginBottom:4}}>💰 費用分攤試算</div>
              <div style={{fontSize:12,color:"#6b8aa8"}}>總費用 NT${n} ÷ 目前 {totalPeople} 人 = <span style={{color:"#fbbf24",fontWeight:700}}>每人約 NT${per}</span></div>
            </div>
          );
        })()}

        {/* 已成團：確定資訊 + 匯出 */}
        {isConfirmed&&group.confirmed?.finalDate&&(
          <div style={{background:"#0a1f0a",border:"1px solid #34d39944",borderRadius:10,padding:14,marginBottom:10}}>
            <div style={{fontWeight:700,color:"#34d399",marginBottom:8,fontSize:13}}>✅ 確定活動資訊</div>
            <div style={{fontSize:13,color:"#bae6fd",marginBottom:4}}>📅 {group.confirmed.finalDate} {group.confirmed.finalSlot}</div>
            {group.confirmed.finalLocation&&<div style={{fontSize:13,color:"#bae6fd",marginBottom:10}}>📍 {group.confirmed.finalLocation}</div>}
            <button style={S.btn("success")} onClick={()=>exportToGCal(group.activityName,group.confirmed.finalDate,group.confirmed.finalSlot,TIME_SLOTS.find(s=>s.label===group.confirmed.finalSlot)?.time,group.confirmed.finalLocation||group.location)}>
              📅 匯出到 Google Calendar
            </button>
          </div>
        )}

        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button style={S.btn("ghost")} onClick={()=>setTab("home")}>← 返回列表</button>
        </div>
      </div>

      {/* 跟團 / 報名區 */}
      {joinStep===0&&(
        <div style={S.card}>
          {isConfirmed?(
            group.confirmed?.allowJoin===false?(
              <div style={{textAlign:"center",padding:20,color:"#6b8aa8",fontSize:14}}>此活動已停止接受報名</div>
            ):(
              <>
                <h3 style={{fontWeight:700,fontSize:15,marginBottom:12,color:"#34d399"}}>🎉 報名參加已成團活動</h3>
                <div style={{fontSize:13,color:"#6b8aa8",marginBottom:16}}>填寫資料後開團者會通知你活動詳情</div>
                <button style={{...S.btn("success"),width:"100%"}} onClick={()=>setJoinStep(3)}>立即報名 →</button>
              </>
            )
          ):(
            isFull&&!isExisting?(
              <div style={{textAlign:"center",padding:20}}>
                <div style={{fontSize:36,marginBottom:8}}>🚫</div>
                <div style={{fontSize:16,fontWeight:800,color:"#f87171",marginBottom:6}}>名額已滿</div>
                <div style={{fontSize:13,color:"#9a4a4a"}}>{joinerCount}/{joinerLimit} 人</div>
              </div>
            ):(
              <>
                <h3 style={{fontWeight:700,fontSize:15,marginBottom:8,color:"#38bdf8"}}>🙋 我要跟團</h3>
                {joinerLimit&&<div style={{fontSize:12,color:isFull?"#f87171":"#38bdf8",marginBottom:12}}>目前 {joinerCount}/{joinerLimit} 人</div>}
                {group.groupType==="private"?(
                  <button style={{...S.btn("primary"),width:"100%"}} onClick={()=>setJoinStep(1)}>輸入跟團密碼 →</button>
                ):(
                  <button style={{...S.btn("primary"),width:"100%"}} onClick={()=>setJoinStep(2)}>填寫跟團資料 →</button>
                )}
              </>
            )
          )}
        </div>
      )}

      {/* 限定團密碼驗證 */}
      {joinStep===1&&(
        <div style={S.card}>
          <h3 style={{fontWeight:700,fontSize:15,marginBottom:12,color:"#a78bfa"}}>🔒 輸入跟團密碼</h3>
          <F label="跟團密碼" required><input type="password" style={S.input} placeholder="請輸入開團者提供的密碼" value={joinPw} onChange={e=>setJoinPw(e.target.value)}/></F>
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button style={S.btn("ghost")} onClick={()=>setJoinStep(0)}>← 返回</button>
            <button style={{...S.btn("primary"),flex:1}} onClick={()=>{if(joinPw===group.joinPassword){setJoinStep(2);}else showToast("❌ 密碼錯誤");}}>確認 →</button>
          </div>
        </div>
      )}

      {/* 跟團填資料 */}
      {joinStep===2&&(
        <div style={S.card}>
          <h3 style={{fontWeight:700,fontSize:15,marginBottom:14,color:"#38bdf8"}}>🙋 填寫跟團資料</h3>
          <div style={{marginBottom:14}}><F label="姓名" required><input style={S.input} placeholder="你的名字" value={name} onChange={e=>setName(e.target.value)}/>{isExisting&&<div style={{fontSize:11,color:"#fbbf24",marginTop:4}}>⚠ 此名字已有記錄，送出後會覆蓋</div>}</F></div>
          <div style={S.g2}>
            <F label="信箱" required hint="僅供活動通知"><input type="email" style={S.input} placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)}/></F>
            <F label="聯絡方式" hint="選填"><input style={S.input} placeholder="IG / Line ID" value={contact} onChange={e=>setContact(e.target.value)}/></F>
          </div>
          <label style={S.label}>可以的時間 <span style={{fontWeight:400,fontSize:10,color:"#374a5e"}}>(點格子切換)</span></label>
          <SlotPicker dates={dates} mySlots={slots} setMySlots={setSlots} organizerSlots={group.organizerSlots||{}} otherJoiners={Object.fromEntries(Object.entries(joiners).filter(([n])=>n!==name.trim()))}/>
          <div style={{height:14}}/>
          <F label="備註"><textarea style={S.textarea} placeholder="有什麼想說的…" value={note} onChange={e=>setNote(e.target.value)}/></F>
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button style={S.btn("ghost")} onClick={()=>setJoinStep(0)}>← 返回</button>
            <button style={{...S.btn("success"),flex:1,opacity:submitting?0.6:1}} onClick={submitJoin} disabled={submitting}>{submitting?"送出中…":"🙌 送出跟團！"}</button>
          </div>
        </div>
      )}

      {/* 已成團報名 */}
      {joinStep===3&&(
        <div style={S.card}>
          <h3 style={{fontWeight:700,fontSize:15,marginBottom:14,color:"#34d399"}}>🎉 報名參加</h3>
          <div style={{marginBottom:14}}><F label="姓名" required><input style={S.input} placeholder="你的名字" value={name} onChange={e=>setName(e.target.value)}/></F></div>
          <div style={{marginBottom:14}}><F label="信箱" required hint="僅供活動通知"><input type="email" style={S.input} placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)}/></F></div>
          <F label="聯絡方式" required hint="如 IG、Line ID"><input style={S.input} placeholder="IG / Line ID" value={contact} onChange={e=>setContact(e.target.value)}/></F>
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button style={S.btn("ghost")} onClick={()=>setJoinStep(0)}>← 返回</button>
            <button style={{...S.btn("success"),flex:1,opacity:submitting?0.6:1}} onClick={submitRegister} disabled={submitting}>{submitting?"送出中…":"🎉 確認報名！"}</button>
          </div>
        </div>
      )}

      {/* 時間交集 */}
      {(names.length>0||hasOrgSlots)&&(
        <div style={S.card}>
          <label style={S.label}>時間交集 {hasOrgSlots&&<span style={{fontSize:11,color:"#38bdf8",fontWeight:400}}>(含主揪)</span>}</label>
          <SlotPicker dates={dates} readOnly countMap={countMap} maxCount={totalCount} intersect={intersect} joiners={allParticipants}/>
          {intersectList.length>0&&(
            <div style={{marginTop:14,padding:14,background:"#0a1628",border:"1px solid #38bdf844",borderRadius:10}}>
              <div style={{fontWeight:700,color:"#38bdf8",marginBottom:8,fontSize:13}}>✨ 所有人都可以的時段</div>
              {intersectList.map((s,i)=><div key={i} style={{fontSize:13,color:"#bae6fd",marginBottom:3}}>• {s.label}</div>)}
            </div>
          )}
          {names.some(n=>joiners[n].note)&&(
            <><hr style={S.hr}/><label style={S.label}>備註</label>{names.filter(n=>joiners[n].note).map((n,i)=><div key={n} style={{fontSize:13,marginBottom:6}}><span style={S.badge(COLORS[i%COLORS.length])}>{n}</span><span style={{color:"#8aaac8",marginLeft:8}}>{joiners[n].note}</span></div>)}</>
          )}
        </div>
      )}
    </div>);
  };

  // ── ADMIN ──
  const AdminTab=()=>{
    const [step,setStep]=useState(1);
    const [gid,setGid]=useState(""), [pw,setPw]=useState(""), [authedId,setAuthedId]=useState(null);
    const [editGroup,setEditGroup]=useState(null),[editJoiner,setEditJoiner]=useState(null),[editSlots,setEditSlots]=useState({});
    const [editingOrgSlots,setEditingOrgSlots]=useState(false),[orgSlotsDraft,setOrgSlotsDraft]=useState({});
    const [editingConfirmed,setEditingConfirmed]=useState(false);
    const [confirmedDraft,setConfirmedDraft]=useState({finalDate:"",finalSlot:"",finalLocation:"",allowJoin:true});

    const login=()=>{
      const id=gid.trim().toLowerCase(),g=groups[id];
      if(!g){showToast("❌ 找不到此開團編號");return;}
      if(g.password!==pw){showToast("❌ 密碼錯誤");return;}
      setAuthedId(id);setEditGroup({...g});setStep(2);
    };
    const group=authedId?groups[authedId]:null;
    const dates=group?getDates(group):null;
    const saveGroupInfo=async()=>{const next={...groups,[authedId]:{...groups[authedId],...editGroup}};await saveGroups(next);showToast("✅ 已更新");};
    const deleteGroup=async()=>{if(!window.confirm(`確定刪除「${group?.activityName}」？`))return;const next={...groups};delete next[authedId];await saveGroups(next);setStep(1);setAuthedId(null);showToast("🗑 已刪除");};
    const deleteJoiner=async(name)=>{const next={...groups};delete next[authedId].joiners[name];await saveGroups(next);showToast(`🗑 已刪除 ${name}`);};
    const openEditJoiner=(name)=>{const data=groups[authedId].joiners[name];setEditJoiner({name,note:data.note||""});setEditSlots({...(data.slots||{})});};
    const saveJoiner=async()=>{const next={...groups};next[authedId].joiners[editJoiner.name]={...next[authedId].joiners[editJoiner.name],slots:editSlots,note:editJoiner.note};await saveGroups(next);setEditJoiner(null);showToast("✅ 已更新");};
    const set=(k,v)=>setEditGroup(p=>({...p,[k]:v}));
    const openEditOrgSlots=()=>{setOrgSlotsDraft({...(groups[authedId]?.organizerSlots||{})});setEditingOrgSlots(true);};
    const saveOrgSlots=async()=>{const next={...groups,[authedId]:{...groups[authedId],organizerSlots:orgSlotsDraft}};await saveGroups(next);setEditingOrgSlots(false);showToast("✅ 已更新時段");};

    // 已成案
    const markConfirmed=async()=>{
      const next={...groups,[authedId]:{...groups[authedId],status:"confirmed",confirmed:{...confirmedDraft,confirmedAt:Date.now()}}};
      await saveGroups(next);setEditingConfirmed(false);showToast("✅ 已標記為成團！");
    };
    const unmarkConfirmed=async()=>{
      const next={...groups,[authedId]:{...groups[authedId],status:"open",confirmed:null}};
      await saveGroups(next);showToast("✅ 已取消成團標記");
    };

    if(step===1)return(<div style={S.card}>
      <h2 style={S.sT}>🔐 開團者登入</h2>
      <div style={{marginBottom:14}}><F label="開團編號"><input style={S.input} placeholder="開團編號" value={gid} onChange={e=>setGid(e.target.value)}/></F></div>
      <div style={{marginBottom:16}}><F label="管理密碼"><input type="password" style={S.input} placeholder="管理密碼" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/></F></div>
      <button style={{...S.btn("primary"),width:"100%"}} onClick={login}>登入 →</button>
    </div>);

    if(editingOrgSlots)return(<div style={S.card}>
      <h2 style={S.sT}>📅 修改主揪時段</h2>
      {dates?<SlotPicker dates={dates} mySlots={orgSlotsDraft} setMySlots={setOrgSlotsDraft} otherJoiners={groups[authedId]?.joiners||{}}/>:<div style={{color:"#f87171",fontSize:13}}>請先設定活動日期</div>}
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <button style={S.btn("ghost")} onClick={()=>setEditingOrgSlots(false)}>← 返回</button>
        <button style={{...S.btn("success"),flex:1}} onClick={saveOrgSlots}>💾 儲存時段</button>
      </div>
    </div>);

    if(editJoiner)return(<div style={S.card}>
      <h2 style={S.sT}>✏️ 修改：{editJoiner.name}</h2>
      <SlotPicker dates={dates} mySlots={editSlots} setMySlots={setEditSlots} organizerSlots={groups[authedId]?.organizerSlots||{}} otherJoiners={Object.fromEntries(Object.entries(groups[authedId]?.joiners||{}).filter(([n])=>n!==editJoiner?.name))}/>
      <div style={{height:14}}/>
      <F label="備註"><textarea style={S.textarea} value={editJoiner.note} onChange={e=>setEditJoiner(p=>({...p,note:e.target.value}))}/></F>
      <div style={{display:"flex",gap:10,marginTop:14}}>
        <button style={S.btn("ghost")} onClick={()=>setEditJoiner(null)}>← 返回</button>
        <button style={{...S.btn("success"),flex:1}} onClick={saveJoiner}>💾 儲存</button>
      </div>
    </div>);

    // 確定時間編輯
    if(editingConfirmed)return(<div style={S.card}>
      <h2 style={S.sT}>✅ 設定確定活動資訊</h2>
      <div style={{marginBottom:14}}><F label="確定日期" required><input type="date" style={S.input} value={confirmedDraft.finalDate} onChange={e=>setConfirmedDraft(p=>({...p,finalDate:e.target.value}))}/></F></div>
      <div style={{marginBottom:14}}>
        <label style={S.label}>確定時段 <span style={{color:"#f87171"}}>*</span></label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {TIME_SLOTS.map(s=>(
            <div key={s.key} onClick={()=>setConfirmedDraft(p=>({...p,finalSlot:s.label}))} style={{padding:"8px 14px",borderRadius:8,border:`2px solid ${confirmedDraft.finalSlot===s.label?s.color:"#1e2d45"}`,background:confirmedDraft.finalSlot===s.label?s.color+"22":"#080d18",cursor:"pointer",fontSize:13,fontWeight:700,color:confirmedDraft.finalSlot===s.label?s.color:"#6b8aa8"}}>
              {s.label}<div style={{fontSize:10,fontWeight:400,color:"#6b8aa8"}}>{s.time}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{marginBottom:14}}><F label="確定地點"><input style={S.input} placeholder={group?.location||"地點"} value={confirmedDraft.finalLocation} onChange={e=>setConfirmedDraft(p=>({...p,finalLocation:e.target.value}))}/></F></div>
      <div style={{marginBottom:16}}>
        <label style={S.label}>是否開放繼續報名</label>
        <div style={{display:"flex",gap:10}}>
          {[[true,"✅ 開放報名"],[false,"🚫 不開放報名"]].map(([v,label])=>(
            <div key={String(v)} onClick={()=>setConfirmedDraft(p=>({...p,allowJoin:v}))} style={{flex:1,padding:12,borderRadius:8,border:`2px solid ${confirmedDraft.allowJoin===v?"#38bdf8":"#1e2d45"}`,background:confirmedDraft.allowJoin===v?"#0c2a4a":"#080d18",cursor:"pointer",textAlign:"center",fontSize:13,fontWeight:700,color:confirmedDraft.allowJoin===v?"#38bdf8":"#6b8aa8"}}>{label}</div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button style={S.btn("ghost")} onClick={()=>setEditingConfirmed(false)}>← 返回</button>
        <button style={{...S.btn("success"),flex:1}} onClick={markConfirmed}>✅ 確認成團</button>
      </div>
    </div>);

    const joiners=group?.joiners||{},jnames=Object.keys(joiners);
    const maxP=group?.maxPeople?parseInt(group.maxPeople):null;
    const joinerLimit=maxP?maxP-1:null;
    const isConfirmed=group?.status==="confirmed";

    return(<div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <h2 style={{...S.sT,margin:0}}>⚙️ {group?.activityName}</h2>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button style={S.btn("ghost")} onClick={()=>setTab("view-"+authedId)}>查看活動</button>
          <button style={{...S.btn("danger"),padding:"8px 14px",fontSize:12}} onClick={deleteGroup}>🗑 刪除</button>
          <button style={S.btn("ghost")} onClick={()=>{setStep(1);setAuthedId(null);setGid("");setPw("");}}>登出</button>
        </div>
      </div>

      {/* 已成案按鈕 */}
      <div style={{background:"#080d18",border:`2px solid ${isConfirmed?"#34d39955":"#1e2d45"}`,borderRadius:10,padding:14,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:isConfirmed?"#34d399":"#dde8f5",marginBottom:3}}>{isConfirmed?"✅ 已成團":"⏳ 進行中"}</div>
            {isConfirmed&&group.confirmed?.finalDate&&<div style={{fontSize:12,color:"#6b8aa8"}}>確定時間：{group.confirmed.finalDate} {group.confirmed.finalSlot}</div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            {isConfirmed?(
              <>
                <button style={{...S.btn("primary"),padding:"8px 14px",fontSize:12}} onClick={()=>{setConfirmedDraft({finalDate:group.confirmed?.finalDate||"",finalSlot:group.confirmed?.finalSlot||"",finalLocation:group.confirmed?.finalLocation||"",allowJoin:group.confirmed?.allowJoin!==false});setEditingConfirmed(true);}}>✏️ 修改</button>
                <button style={{...S.btn("ghost"),padding:"8px 14px",fontSize:12}} onClick={unmarkConfirmed}>取消成團</button>
              </>
            ):(
              <button style={{...S.btn("success"),padding:"10px 18px"}} onClick={()=>{setConfirmedDraft({finalDate:"",finalSlot:"",finalLocation:"",allowJoin:true});setEditingConfirmed(true);}}>✅ 標記已成案</button>
            )}
          </div>
        </div>
        {isConfirmed&&(
          <div style={{marginTop:10}}>
            <button style={S.btn("success")} onClick={()=>exportToGCal(group.activityName,group.confirmed.finalDate,group.confirmed.finalSlot,TIME_SLOTS.find(s=>s.label===group.confirmed.finalSlot)?.time,group.confirmed.finalLocation||group.location)}>📅 匯出到 Google Calendar</button>
          </div>
        )}
      </div>

      {/* 主揪時段 */}
      <div style={{background:"#080d18",border:"1px solid #38bdf833",borderRadius:10,padding:14,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontWeight:700,fontSize:14,color:"#38bdf8",marginBottom:3}}>📅 主揪可用時段</div>
          <div style={{fontSize:12,color:"#6b8aa8"}}>{Object.keys(groups[authedId]?.organizerSlots||{}).length>0?`已設定 ${Object.keys(groups[authedId].organizerSlots).length} 個時段`:"尚未設定"}</div>
        </div>
        <button style={S.btn("primary")} onClick={openEditOrgSlots}>✏️ 修改時段</button>
      </div>

      {/* 活動資訊編輯 */}
      <div style={{background:"#080d18",border:"1px solid #1e2d45",borderRadius:10,padding:16,marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14,color:"#e2f0ff",marginBottom:12}}>✏️ 活動資訊</div>
        <div style={S.g2}><F label="活動名稱"><input style={S.input} value={editGroup?.activityName||""} onChange={e=>set("activityName",e.target.value)}/></F><F label="開團者姓名"><input style={S.input} value={editGroup?.name||""} onChange={e=>set("name",e.target.value)}/></F></div>
        <div style={{marginBottom:14}}>
          <label style={S.label}>活動分類</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {CATEGORIES.map(c=>(
              <div key={c.key} onClick={()=>set("category",c.key)} style={{padding:"6px 12px",borderRadius:8,border:`2px solid ${editGroup?.category===c.key?c.color:"#1e2d45"}`,background:editGroup?.category===c.key?c.color+"22":"#080d18",cursor:"pointer",fontSize:12,fontWeight:700,color:editGroup?.category===c.key?c.color:"#6b8aa8"}}>{c.label}</div>
            ))}
          </div>
        </div>
        <div style={S.g2}><F label="信箱" hint="僅供通知"><input type="email" style={S.input} value={editGroup?.email||""} onChange={e=>set("email",e.target.value)}/></F><F label="聯絡方式"><input style={S.input} value={editGroup?.contact||""} onChange={e=>set("contact",e.target.value)}/></F></div>
        <div style={S.g2}><F label="開始日期"><input type="date" style={S.input} value={editGroup?.dateStart||""} onChange={e=>set("dateStart",e.target.value)}/></F><F label="結束日期"><input type="date" style={S.input} value={editGroup?.dateEnd||""} onChange={e=>set("dateEnd",e.target.value)}/></F></div>
        <div style={S.g3}><F label="時數"><input type="number" style={S.input} value={editGroup?.hours||""} onChange={e=>set("hours",e.target.value)}/></F><F label="費用"><input style={S.input} value={editGroup?.cost||""} onChange={e=>set("cost",e.target.value)}/></F><F label="人數上限"><input type="number" style={S.input} value={editGroup?.maxPeople||""} onChange={e=>set("maxPeople",e.target.value)}/></F></div>
        <div style={{marginBottom:14}}><F label="地點"><input style={S.input} value={editGroup?.location||""} onChange={e=>set("location",e.target.value)}/></F></div>
        <F label="說明"><textarea style={S.textarea} value={editGroup?.description||""} onChange={e=>set("description",e.target.value)}/></F>
        <button style={{...S.btn("success"),marginTop:12}} onClick={saveGroupInfo}>💾 儲存</button>
      </div>

      {/* 跟團者列表 */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
        <div style={{fontWeight:700,fontSize:14,color:"#e2f0ff"}}>🙋 跟團者（{jnames.length}{joinerLimit?`/${joinerLimit}`:""}人）</div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {joinerLimit&&<span style={{fontSize:12,color:jnames.length>=joinerLimit?"#f87171":"#34d399"}}>{jnames.length>=joinerLimit?"⛔ 額滿":`還剩 ${joinerLimit-jnames.length} 個名額`}</span>}
          {jnames.length>0&&<button style={{...S.btn("secondary"),padding:"6px 12px",fontSize:12}} onClick={()=>{
            const rows=[["姓名","信箱","聯絡方式","已報名","時段","備註"]];
            jnames.forEach(n=>{
              const j=joiners[n];
              const slotLabels=TIME_SLOTS.filter(s=>Object.keys(j.slots||{}).some(k=>k.endsWith("-"+s.key))).map(s=>s.label).join("、");
              rows.push([n,j.email||"",j.contact||"",j.isRegistered?"是":"",slotLabels,j.note||""]);
            });
            downloadCSV(`跟團者_${group.activityName||authedId}.csv`,rows);
            showToast("📥 已匯出 CSV");
          }}>📥 匯出 CSV</button>}
        </div>
      </div>
      {jnames.length===0&&<p style={{fontSize:13,color:"#374a5e"}}>還沒有人跟團</p>}
      {jnames.map((n,i)=>{
        const j=joiners[n],slotLabels=TIME_SLOTS.filter(slot=>Object.keys(j.slots||{}).some(k=>k.endsWith("-"+slot.key)));
        return(<div key={n} style={{background:"#080d18",border:"1px solid #1e2d45",borderRadius:10,padding:14,marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div>
              <span style={S.badge(COLORS[i%COLORS.length])}>{n}</span>
              {j.isRegistered&&<span style={{marginLeft:6,fontSize:11,color:"#34d399"}}>已報名</span>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button style={{...S.btn("secondary"),padding:"6px 14px",fontSize:12}} onClick={()=>openEditJoiner(n)}>✏️</button>
              <button style={{...S.btn("danger"),padding:"6px 14px",fontSize:12}} onClick={()=>{if(window.confirm(`確定刪除 ${n}？`))deleteJoiner(n);}}>🗑</button>
            </div>
          </div>
          <div style={{fontSize:11,color:"#6b8aa8",marginTop:6,display:"flex",flexWrap:"wrap",gap:"3px 12px"}}>
            {j.email&&<span>📧 {j.email}</span>}
            {j.contact&&<span>📱 {j.contact}</span>}
          </div>
          {j.note&&<div style={{fontSize:12,color:"#6b8aa8",marginTop:4}}>備註：{j.note}</div>}
          <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:4}}>{slotLabels.map(s=><span key={s.key} style={S.badge(s.color)}>{s.label}</span>)}{slotLabels.length===0&&!j.isRegistered&&<span style={{fontSize:12,color:"#374a5e"}}>未選時段</span>}</div>
        </div>);
      })}
    </div>);
  };

  // ── SUPERADMIN ──
  const SuperAdminTab=()=>{
    const [authed,setAuthed]=useState(false),[pw,setPw]=useState("");
    const [subPage,setSubPage]=useState("dashboard");
    const [editJoiner,setEditJoiner]=useState(null),[editSlots,setEditSlots]=useState({});
    const login=async()=>{
      if(!pw.trim()){showToast("❗ 請輸入密碼");return;}
      const d=await DB.get("app","admin");
      if(!d?.password){showToast("❌ 未設定管理員密碼");return;}
      if(d.password!==pw){showToast("❌ 密碼錯誤");return;}
      setAuthed(true);
    };
    const allIds=Object.keys(groups);
    const totalGroups=allIds.length,totalJoiners=allIds.reduce((s,id)=>s+Object.keys(groups[id].joiners||{}).length,0),totalWishes=wishes.length;
    const deleteGroup=async(id)=>{if(!window.confirm(`確定刪除「${groups[id]?.activityName}」？`))return;const next={...groups};delete next[id];await saveGroups(next);showToast("🗑 已刪除");setSubPage("dashboard");};
    const deleteJoiner=async(gid,name)=>{if(!window.confirm(`確定刪除「${name}」？`))return;const next={...groups};delete next[gid].joiners[name];await saveGroups(next);showToast(`🗑 已刪除`);setSubPage("group-"+gid);};
    const openEditJoiner=(gid,name)=>{const d=groups[gid].joiners[name];setEditJoiner({gid,name,note:d.note||""});setEditSlots({...(d.slots||{})});setSubPage("joiner-"+gid+"-"+name);};
    const saveJoiner=async()=>{const{gid,name}=editJoiner;const next={...groups};next[gid].joiners[name]={...next[gid].joiners[name],slots:editSlots,note:editJoiner.note};await saveGroups(next);showToast("✅ 已更新");setSubPage("group-"+gid);};
    const deleteWish=async(i)=>{await saveWishes(wishes.filter((_,j)=>j!==i));showToast("🗑 已刪除");};
    if(!authed)return(<div style={S.card}>
      <h2 style={S.sT}>🛡 網頁管理員</h2>
      <div style={{marginBottom:16}}><F label="管理員密碼"><input type="password" style={S.input} placeholder="管理員密碼" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/></F></div>
      <button style={{...S.btn("primary"),width:"100%"}} onClick={login}>登入 →</button>
    </div>);
    if(subPage.startsWith("joiner-")&&editJoiner){
      const{gid}=editJoiner,dates=getDates(groups[gid]);
      return(<div style={S.card}>
        <h2 style={S.sT}>✏️ {editJoiner.name}</h2>
        <SlotPicker dates={dates} mySlots={editSlots} setMySlots={setEditSlots} organizerSlots={groups[gid]?.organizerSlots||{}} otherJoiners={Object.fromEntries(Object.entries(groups[gid]?.joiners||{}).filter(([n])=>n!==editJoiner.name))}/>
        <div style={{height:14}}/>
        <F label="備註"><textarea style={S.textarea} value={editJoiner.note} onChange={e=>setEditJoiner(p=>({...p,note:e.target.value}))}/></F>
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <button style={S.btn("ghost")} onClick={()=>setSubPage("group-"+editJoiner.gid)}>← 返回</button>
          <button style={{...S.btn("success"),flex:1}} onClick={saveJoiner}>💾 儲存</button>
        </div>
      </div>);
    }
    if(subPage.startsWith("group-")){
      const gid=subPage.replace("group-",""),g=groups[gid];
      if(!g)return null;
      const joiners=g.joiners||{},names=Object.keys(joiners);
      const dates=getDates(g);
      return(<div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
          <h2 style={{...S.sT,margin:0}}>{g.activityName}</h2>
          <div style={{display:"flex",gap:8}}>
            <button style={S.btn("ghost")} onClick={()=>setTab("view-"+gid)}>查看</button>
            <button style={{...S.btn("danger"),padding:"8px 14px",fontSize:12}} onClick={()=>deleteGroup(gid)}>🗑 刪除</button>
            <button style={S.btn("ghost")} onClick={()=>setSubPage("dashboard")}>← 返回</button>
          </div>
        </div>
        <div style={{fontSize:12,color:"#8aaac8",marginBottom:14,display:"flex",flexWrap:"wrap",gap:"4px 14px"}}>
          <span>👤 {g.name}</span>{g.email&&<span>📧 {g.email}</span>}{g.dateStart&&<span>📅 {fmt(g.dateStart)}</span>}
        </div>
        <div style={{fontWeight:700,fontSize:14,color:"#e2f0ff",marginBottom:10}}>🙋 跟團者（{names.length}人）</div>
        {names.length===0&&<p style={{fontSize:13,color:"#374a5e"}}>還沒有人跟團</p>}
        {names.map((n,i)=>{
          const j=joiners[n],slotLabels=TIME_SLOTS.filter(slot=>Object.keys(j.slots||{}).some(k=>k.endsWith("-"+slot.key)));
          return(<div key={n} style={{background:"#080d18",border:"1px solid #1e2d45",borderRadius:10,padding:14,marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <span style={S.badge(COLORS[i%COLORS.length])}>{n}</span>
              <div style={{display:"flex",gap:8}}>
                <button style={{...S.btn("secondary"),padding:"6px 14px",fontSize:12}} onClick={()=>openEditJoiner(gid,n)}>✏️</button>
                <button style={{...S.btn("danger"),padding:"6px 14px",fontSize:12}} onClick={()=>deleteJoiner(gid,n)}>🗑</button>
              </div>
            </div>
            <div style={{fontSize:11,color:"#6b8aa8",marginTop:4,display:"flex",flexWrap:"wrap",gap:"3px 12px"}}>{j.email&&<span>📧 {j.email}</span>}{j.contact&&<span>📱 {j.contact}</span>}</div>
            <div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:4}}>{slotLabels.map(s=><span key={s.key} style={S.badge(s.color)}>{s.label}</span>)}</div>
          </div>);
        })}
      </div>);
    }
    return(<div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:8}}>
        <h2 style={{...S.sT,margin:0}}>🛡 網頁管理員</h2>
        <button style={S.btn("ghost")} onClick={()=>{setAuthed(false);setPw("");}}>登出</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        {[["🎪","活動",totalGroups,"#38bdf8"],["🙋","跟團人次",totalJoiners,"#34d399"],["🌟","許願",totalWishes,"#a78bfa"]].map(([icon,label,val,color])=>(
          <div key={label} style={{background:"#080d18",border:`1px solid ${color}33`,borderRadius:12,padding:16,textAlign:"center"}}>
            <div style={{fontSize:22}}>{icon}</div>
            <div style={{fontSize:28,fontWeight:900,color,fontFamily:"'Syne',sans-serif"}}>{val}</div>
            <div style={{fontSize:11,color:"#6b8aa8",marginTop:2}}>{label}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
        <div style={{fontWeight:700,fontSize:14,color:"#e2f0ff"}}>🎪 所有活動</div>
        {allIds.length>0&&<button style={{...S.btn("secondary"),padding:"6px 12px",fontSize:12}} onClick={()=>{
          const rows=[["編號","活動名稱","分類","主揪","信箱","跟團人數","狀態","開始日期"]];
          allIds.forEach(id=>{const g=groups[id];rows.push([id,g.activityName,getCategory(g.category).label,g.name,g.email,Object.keys(g.joiners||{}).length,g.status==="confirmed"?"已成團":"進行中",g.dateStart||""]);});
          downloadCSV("所有活動.csv",rows);
          showToast("📥 已匯出 CSV");
        }}>📥 匯出全部活動</button>}
      </div>
      {allIds.map((id,i)=>{const g=groups[id],jc=Object.keys(g.joiners||{}).length;return(<div key={id} style={{background:"#080d18",border:"1px solid #1e2d45",borderRadius:10,padding:14,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{cursor:"pointer",flex:1}} onClick={()=>setSubPage("group-"+id)}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={S.badge(COLORS[i%COLORS.length])}># {id}</span><span style={{fontWeight:700,fontSize:13}}>{g.activityName}</span>{g.status==="confirmed"&&<span style={{fontSize:11,color:"#34d399"}}>✅成團</span>}</div>
          <div style={{fontSize:12,color:"#6b8aa8",marginTop:3}}>👤 {g.name} ｜ 🙋 {jc}人 ｜ 📅 {fmt(g.dateStart)}</div>
        </div>
        <button style={{...S.btn("danger"),padding:"6px 12px",fontSize:12}} onClick={()=>deleteGroup(id)}>🗑</button>
      </div>);})}
      <hr style={{...S.hr,margin:"20px 0"}}/>
      <div style={{fontWeight:700,fontSize:14,color:"#e2f0ff",marginBottom:10}}>🌟 許願池（{wishes.length}）</div>
      {wishes.map((w,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#080d18",border:"1px solid #1e2d45",borderRadius:10,padding:14,marginBottom:8}}>
        <div><div style={{fontSize:13}}>{w.content}</div><div style={{fontSize:11,color:"#374a5e",marginTop:3}}>❤️ {w.likes||0} ｜ {new Date(w.time).toLocaleDateString("zh-TW")}</div></div>
        <button style={{...S.btn("danger"),padding:"4px 10px",fontSize:12}} onClick={()=>deleteWish(i)}>🗑</button>
      </div>))}
    </div>);
  };

  // ── WISH ──
  const WishTab=()=>{
    const [content,setContent]=useState(""),[likeEmail,setLikeEmail]=useState(""),[likingIdx,setLikingIdx]=useState(null);
    const submit=async()=>{
      if(!content.trim()){showToast("❗ 請填寫許願內容");return;}
      await saveWishes([{content:content.trim(),time:Date.now(),likes:0,likedEmails:[]},...wishes]);
      setContent("");showToast("🌟 許願成功！");
    };
    const like=async(i)=>{
      if(!likeEmail.trim()||!isValidEmail(likeEmail)){showToast("❗ 請先填寫有效信箱才能按讚");return;}
      const w=wishes[i];
      if((w.likedEmails||[]).includes(likeEmail.trim())){showToast("❗ 你已經按過讚了");return;}
      const next=[...wishes];
      next[i]={...w,likes:(w.likes||0)+1,likedEmails:[...(w.likedEmails||[]),likeEmail.trim()]};
      await saveWishes(next);showToast("❤️ 按讚成功！");
    };
    const sorted=[...wishes].map((w,i)=>({...w,_i:i})).sort((a,b)=>(b.likes||0)-(a.likes||0)||(a.time-b.time));
    return(<div style={S.card}>
      <h2 style={S.sT}>🌟 許願池</h2>
      <p style={{fontSize:13,color:"#6b8aa8",marginBottom:14}}>投入想玩的活動點子，按讚支持你想參加的！</p>
      <F label="你想玩什麼？"><textarea style={S.textarea} placeholder="例：想去爬山、想辦桌遊之夜…" value={content} onChange={e=>setContent(e.target.value)}/></F>
      <button style={{...S.btn("primary"),marginTop:12}} onClick={submit}>🌟 投入許願池</button>
      {wishes.length>0&&<>
        <hr style={{...S.hr,margin:"20px 0"}}/>
        <div style={{marginBottom:14}}>
          <label style={S.label}>你的信箱 <span style={{fontSize:10,color:"#374a5e",fontWeight:400,textTransform:"none"}}>（選填，填寫後才能按讚，僅供活動通知）</span></label>
          <input type="email" style={S.input} placeholder="your@email.com" value={likeEmail} onChange={e=>setLikeEmail(e.target.value)}/>
        </div>
        <label style={S.label}>許願清單（{wishes.length}）— 依讚數排行</label>
        {sorted.map((w,rank)=>(
          <div key={w._i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#080d18",border:"1px solid #1e2d45",borderRadius:10,padding:14,marginBottom:8,gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
              <span style={{fontSize:16,fontWeight:900,color:rank===0?"#fbbf24":rank===1?"#9ca3af":rank===2?"#b45309":"#374a5e",fontFamily:"monospace",minWidth:24}}>#{rank+1}</span>
              <div><div style={{fontSize:14}}>{w.content}</div><div style={{fontSize:11,color:"#374a5e",marginTop:3}}>{new Date(w.time).toLocaleDateString("zh-TW")}</div></div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <button onClick={()=>like(w._i)} style={{background:"#a78bfa22",border:"1px solid #a78bfa55",borderRadius:8,padding:"6px 12px",cursor:"pointer",color:"#a78bfa",fontWeight:700,fontSize:13}}>❤️ {w.likes||0}</button>
              <button onClick={async()=>{await saveWishes(wishes.filter((_,j)=>j!==w._i));showToast("🗑 已刪除");}} style={{background:"transparent",border:"none",color:"#374a5e",cursor:"pointer",fontSize:11}}>刪除</button>
            </div>
          </div>
        ))}
      </>}
      {wishes.length===0&&<p style={{color:"#374a5e",fontSize:13,marginTop:14}}>許願池是空的，快來許願！</p>}
    </div>);
  };

  // ── MANAGE（團主 + 管理員合併頁）──
  const ManageTab=()=>(
    <div>
      <AdminTab/>
      <div style={{height:16}}/>
      <SuperAdminTab/>
    </div>
  );

  const isView=tab.startsWith("view-");
  const viewGid=isView?tab.replace("view-",""):null;
  const navItems=[{key:"home",label:"🏠 首頁"},{key:"organizer",label:"🚀 開團中"},{key:"register",label:"📋 報名活動"},{key:"wish",label:"🌟 許願池"},{key:"manage",label:"🔐 團主及管理員"}];

  return(
    <div style={S.root}>
      <div style={S.topbar}>
        <h1 style={S.title}>🎯 JoinUp 揪團神器</h1>
        <div style={S.nav}>
          {navItems.map(({key,label})=><button key={key} style={S.navBtn(tab===key)} onClick={()=>setTab(key)}>{label}</button>)}
          {isView&&<button style={S.navBtn(true)}>📊 活動詳情</button>}
        </div>
      </div>
      <div>
        {loading&&<div style={{textAlign:"center",padding:40,color:"#374a5e"}}>載入中…</div>}
        {!loading&&tab==="home"&&<HomeTab/>}
        {!loading&&tab==="organizer"&&<OrganizerTab/>}
        {!loading&&tab==="register"&&<RegisterTab/>}
        {!loading&&tab==="manage"&&<ManageTab/>}
        {!loading&&tab==="wish"&&<WishTab/>}
        {!loading&&isView&&<ViewTab gid={viewGid}/>}
      </div>
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#0f1729",border:"1px solid #38bdf8",borderRadius:10,padding:"10px 22px",fontSize:14,fontWeight:600,color:"#38bdf8",zIndex:999,boxShadow:"0 4px 24px #38bdf822",whiteSpace:"nowrap"}}>{toast}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
