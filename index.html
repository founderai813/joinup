// 密碼 Hash (SHA-256)
const sha256=async(text)=>{
  try{
    const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(text||""));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch{return text;}
};
const isHash=(s)=>typeof s==="string"&&/^[0-9a-f]{64}$/.test(s);
// 判斷密碼是否吻合（相容舊明文）：傳入使用者輸入 + 存檔中的值
const matchPw=async(input,stored)=>{
  if(!stored)return false;
  if(isHash(stored)) return (await sha256(input))===stored;
  return input===stored;
};
// 圖片壓縮為 base64（預設最大邊 800px、JPEG q 0.72，約 30~80KB）
const compressImage=(file,maxW=800,quality=0.72)=>new Promise((resolve,reject)=>{
  if(!file)return reject(new Error("no file"));
  if(!file.type.startsWith("image/"))return reject(new Error("not image"));
  const reader=new FileReader();
  reader.onload=(e)=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxW/img.width,maxW/img.height);
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const c=document.createElement("canvas");
      c.width=w; c.height=h;
      const ctx=c.getContext("2d");
      ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      resolve(c.toDataURL("image/jpeg",quality));
    };
    img.onerror=()=>reject(new Error("image load failed"));
    img.src=e.target.result;
  };
  reader.onerror=()=>reject(new Error("read failed"));
  reader.readAsDataURL(file);
});

// SlotPicker
// 獨立 Toast 元件（自己管狀態，不牽動 App 重渲染 → 打字鍵盤不會跳）
function ToastOverlay() {
  const [msg, setMsg] = useState("");
  const timerRef = useRef();
  useEffect(() => {
    const handler = (e) => {
      setMsg(e.detail);
      clearTimeout(timerRef.current);
      timerRef.current = setTimeout(() => setMsg(""), 2800);
    };
    window.addEventListener("ju-toast", handler);
    return () => window.removeEventListener("ju-toast", handler);
  }, []);
  if (!msg) return null;
  return (<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"#0f1729",border:"1px solid #38bdf8",borderRadius:10,padding:"10px 22px",fontSize:14,fontWeight:600,color:"#38bdf8",zIndex:999,boxShadow:"0 4px 24px #38bdf822",whiteSpace:"nowrap",maxWidth:"90vw",textAlign:"center"}}>{msg}</div>);
}
const showToastGlobal = (msg) => window.dispatchEvent(new CustomEvent("ju-toast", {detail: msg}));

function SlotPicker({ dates, mySlots={}, setMySlots=()=>{}, organizerSlots={}, otherJoiners={}, readOnly=false, countMap={}, maxCount=1, intersect={}, joiners={}, restrictToOrganizer=false }) {
  const [popup, setPopup] = useState(null);
  const [weekPage, setWeekPage] = useState(0);
  // 週一當第一天：把 dates 分成以 Mon-Sun 為欄位的週別矩陣
  const dowMon = (d)=>{const x=new Date(d).getDay();return x===0?6:x-1;};
  const weeks = dates?(()=>{
    if(dates.length===0)return[];
    const result=[]; let cur=[null,null,null,null,null,null,null]; let prevDow=-1;
    dates.forEach((d,i)=>{
      const dow=dowMon(d);
      if(prevDow!==-1&&dow<=prevDow){result.push(cur);cur=[null,null,null,null,null,null,null];}
      cur[dow]={date:d,globalDi:i};
      prevDow=dow;
    });
    result.push(cur);
    return result;
  })():null;
  const totalWeeks = weeks?weeks.length:1;
  const pageW = weeks?weeks[weekPage]:null;
  const cols = 7;
  // 表頭：Mon-Sun 固定欄位，活動日期填入 MM/DD
  const headers = pageW
    ?pageW.map((cell,idx)=>{
      if(!cell)return{top:"",bot:DAYS_SHORT[idx]};
      const dt=new Date(cell.date);
      return{top:`${dt.getMonth()+1}/${dt.getDate()}`,bot:DAYS_SHORT[idx]};
    })
    :DAYS_SHORT.map(d=>({top:d,bot:""}));
  const otherNames=Object.keys(otherJoiners);
  const otherCnt=(key)=>otherNames.filter(n=>otherJoiners[n].slots?.[key]).length;
  const hasOrgLimit=restrictToOrganizer&&Object.keys(organizerSlots||{}).length>0;
  const handleClick=(cell,sk)=>{
    if(!cell&&dates)return; // 空格子（非活動日期），不可點
    const globalDi=cell?cell.globalDi:0, key=`${globalDi}-${sk}`;
    if(readOnly){
      const cnt=countMap[key]||0; if(cnt===0){setPopup(null);return;}
      const slot=TIME_SLOTS.find(s=>s.key===sk), d=cell?cell.date:null;
      const dateLabel=d?(()=>{const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}(${DAYS_SHORT[dowMon(d)]})`;})():`週${DAYS_SHORT[globalDi]}`;
      const canNames=Object.keys(joiners).filter(n=>joiners[n].slots?.[key]);
      const cannotNames=Object.keys(joiners).filter(n=>!joiners[n].slots?.[key]);
      setPopup(popup?.key===key?null:{key,slot,dateLabel,canNames,cannotNames}); return;
    }
    // 限定：只能選團主有標的時段
    if(hasOrgLimit&&!organizerSlots[key]){
      showToastGlobal("❗ 只能選團主標記過的時段");
      return;
    }
    setMySlots(p=>{const n={...p};if(n[key])delete n[key];else n[key]=true;return n;}); setPopup(null);
  };
  const getCellStyle=(key)=>{
    if(readOnly){
      const cnt=countMap[key]||0,isX=intersect[key];
      if(isX&&maxCount>1)return{bg:"#38bdf8",border:"1px solid #7dd3fc",text:"#fff"};
      if(cnt>0){const r=cnt/maxCount;return{bg:`rgba(56,189,248,${0.18+r*0.5})`,border:"1px solid transparent",text:"#fff"};}
      return{bg:"#1e2d45",border:"1px solid transparent",text:"transparent"};
    }
    const isMine=!!mySlots[key],isOrg=!!organizerSlots[key],others=otherCnt(key);
    // 顯示可來人數：主揪 + 其他跟團者 + 我（若有選）
    const canCount=(isOrg?1:0)+others+(isMine?1:0);
    const totalPeople=1+otherNames.length+1; // 主揪 + 其他跟團者 + 我
    const isFullIntersect=isOrg&&isMine&&others===otherNames.length&&otherNames.length>0;
    const badge=canCount>1?(isFullIntersect?`✨${canCount}`:`${canCount}`):null;
    // 限制模式：團主沒標的時段完全隱形（只留下可選的時段）
    if(hasOrgLimit&&!isOrg)return{bg:"transparent",border:"none",text:"transparent",badge:null,disabled:true};
    if(isFullIntersect)return{bg:"#38bdf8",border:"2px solid #7dd3fc",text:"#fff",badge};
    if(isMine)return isOrg?{bg:"#22c55e",border:"2px solid #4ade80",text:"#fff",badge}:{bg:"#16a34a",border:"2px solid #22c55e",text:"#fff",badge};
    if(isOrg)return others>0?{bg:"#0f3460",border:"2px solid #38bdf8",text:"#fbbf24",badge}:{bg:"#0c2a4a",border:"2px solid #38bdf8",text:"transparent",badge:null};
    if(others>0)return{bg:"#2a1a0a",border:"2px solid #f97316",text:"#fb923c",badge};
    return{bg:"#1a2535",border:"1px solid #2a3f5a",text:"transparent",badge:null};
  };
  return (
    <div style={{userSelect:"none"}}>
      {weeks&&totalWeeks>1&&(()=>{
        const firstCell=pageW?.find(c=>c);
        const lastCell=pageW?.slice().reverse().find(c=>c);
        const rangeText=(firstCell?`${new Date(firstCell.date).getMonth()+1}/${new Date(firstCell.date).getDate()}`:"")+(lastCell&&lastCell!==firstCell?` ~ ${new Date(lastCell.date).getMonth()+1}/${new Date(lastCell.date).getDate()}`:"");
        return(
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,gap:8}}>

        </div>

          {popup.canNames.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:11,color:"#34d399",fontWeight:700,marginBottom:6}}>✅ 可以（{popup.canNames.length}人）</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{popup.canNames.map((n,i)=><span key={n} style={{background:COLORS[i%COLORS.length]+"33",border:`1px solid ${COLORS[i%COLORS.length]}66`,borderRadius:7,padding:"4px 12px",fontSize:13,color:COLORS[i%COLORS.length],fontWeight:700}}>{n}</span>)}</div></div>}
          {popup.cannotNames.length>0&&<div><div style={{fontSize:11,color:"#6b8aa8",fontWeight:700,marginBottom:6}}>❌ 不行（{popup.cannotNames.length}人）</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{popup.cannotNames.map(n=><span key={n} style={{background:"#1e2d45",border:"1px solid #2a3f5a",borderRadius:7,padding:"4px 12px",fontSize:13,color:"#5a7a9a"}}>{n}</span>)}</div></div>}
        </div>
      )}
    </div>
  );
}

// ── App ──
function App() {
  // 初始化 tab：從 URL ?a=xxx 讀取，預設 home
  const initialTab=(()=>{try{const p=new URLSearchParams(location.search);const a=p.get("a");return a?"view-"+a:"home";}catch{return "home";}})();
  const [tab, setTabRaw] = useState(initialTab);
  const setTab = (t)=>{
    setTabRaw(t);
    try{
      const url=new URL(location.href);
      if(typeof t==="string"&&t.startsWith("view-")){
        url.searchParams.set("a",t.replace("view-",""));
      }else{
        url.searchParams.delete("a");
      }
      history.replaceState({},"",url.toString());
    }catch{}
  };
  const [toast, setToast] = useState(""); // 保留但不再觸發 App 重渲染（僅給舊程式相容，已改 showToast 走 event bus）
  const [template, setTemplate] = useState(null);
  // 用 useRef 保存開團表單（不觸發 App 重渲染），Tab 內用 local state 初始化自 ref
  const initForm=()=>({id:"",password:"",joinPassword:"",name:"",email:"",contact:"",dateStart:"",dateEnd:"",hours:"",location:"",activityName:"",description:"",cost:"",maxPeople:"",groupType:"open",category:"other",images:[],note:""});
  // 相容舊資料：舊活動用 image（字串），新活動用 images（陣列）
  const getImages=(g)=>{if(g?.images?.length>0)return g.images;if(g?.image)return[g.image];return[];};
  const orgFormRef=useRef(initForm());
  const orgSlotsRef=useRef({});
  const orgDoneRef=useRef(null);
  const orgIdErrRef=useRef("");
  const orgImgLoadingRef=useRef(false);
  const [groups, setGroups] = useState({});
  const [wishes, setWishes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [fbReady, setFbReady] = useState(false);
  const showToast=(msg)=>{window.dispatchEvent(new CustomEvent("ju-toast",{detail:msg}));};

  const initRanRef=useRef(false);
  // 從所有來源（Firestore 新／舊架構、localStorage）盡可能撈出活動資料並合併
  const recoverAllSources=async()=>{
    const merged={};
    const stats={activities:0,oldDoc:0,lsIndividual:0,lsOld:0};
    const x=_x();
    if(x?.ready){
      try{
        const coll=await DB.getAll("activities");
        if(coll){
          for(const[id,data]of Object.entries(coll)){
            if(data&&!merged[id]){merged[id]=data;stats.activities++;}
          }
        }
      }catch(e){console.error("[JoinUp] /activities/ error:",e);}
      try{
        const old=await x.g("app","groups");
        if(old?.data){
          for(const[id,data]of Object.entries(old.data)){
            if(data&&!merged[id]){merged[id]=data;stats.oldDoc++;}
          }
        }
      }catch(e){console.error("[JoinUp] /app/groups error:",e);}
    }
    try{
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith("ju_activities_")){
          const id=k.slice("ju_activities_".length);
          if(!merged[id]){
            const v=ls.get("activities_"+id);
            if(v){merged[id]=v;stats.lsIndividual++;}
          }
        }
      }
    }catch(e){console.error(e);}
    try{
      const lg=ls.get("app_groups");
      if(lg?.data){
        for(const[id,data]of Object.entries(lg.data)){
          if(data&&!merged[id]){merged[id]=data;stats.lsOld++;}
        }
      }
    }catch(e){console.error(e);}
    return{merged,stats};
  };

  useEffect(()=>{
    const init=async()=>{
      if(initRanRef.current)return;
      initRanRef.current=true;
      const x=_x();
      console.log("[JoinUp] init, firebase ready:",!!x?.ready);
      const{merged,stats}=await recoverAllSources();
      const total=Object.keys(merged).length;
      console.log("[JoinUp] recovered",total,"activities — sources:",stats);
      // 把舊來源的資料寫回新架構（避免下次又從舊位置讀）
      if(x?.ready&&total>0){
        try{
          const inActivities=await DB.getAll("activities");
          const haveIds=new Set(inActivities?Object.keys(inActivities):[]);
          let restored=0;
          for(const[id,data]of Object.entries(merged)){
            if(!haveIds.has(id)){
              await DB.set("activities",id,data);
              restored++;
            }
          }
          if(restored>0){
            console.log("[JoinUp] restored",restored,"activities to /activities/");
            showToast(`🔄 已恢復 ${restored} 筆活動`);
          }
        }catch(e){console.error("[JoinUp] restore error:",e);}
      }
      if(total>0){
        setGroups(merged);
      }else{
        console.warn("[JoinUp] NO DATA FOUND from any source");
      }
      const w=await DB.get("app","wishes"); if(w?.data)setWishes(w.data);
      setLoading(false);
    };
    const onReady=()=>{console.log("[JoinUp] firebase-ready event");setFbReady(true);init();};
    if(_x()?.ready){setFbReady(true);init();}
    else{window.addEventListener("firebase-ready",onReady);init();}
    return()=>window.removeEventListener("firebase-ready",onReady);
  },[]);

  // 取得最新活動資料的安全版本：合併 server 與 React state，避免 server 回傳空集合時誤刪
  const getLatestSafe=async()=>{
    const remote=await DB.getAll("activities");
    return{...groups,...(remote||{})};
  };

  // 估算資料大小（位元組）
  const estimateSize=(obj)=>{try{return JSON.stringify(obj).length;}catch{return 0;}};
  const calcImageSize=(grs)=>Object.values(grs||{}).reduce((s,g)=>s+getImages(g).reduce((a,img)=>a+(img?.length||0),0),0);
  // 新架構：每個活動一個 Firestore 文件。saveGroups 自動 diff 並寫入／刪除變更項
  const saveGroups=async(next)=>{
    // 檢查每個活動的大小（單 doc 上限 1MB，保留緩衝到 900KB）
    for(const[id,g]of Object.entries(next)){
      const s=estimateSize(g);
      if(s>900000){
        showToast(`❌「${g.activityName||id}」資料量過大（${Math.round(s/1024)}KB），請縮小圖片或減少內容`);
        return false;
      }
    }
    const prev=groups;
    setGroups(next);
    // 找出變更、新增、刪除
    const prevIds=Object.keys(prev||{}),nextIds=Object.keys(next||{});
    const toWrite=[],toDelete=[];
    for(const id of nextIds){
      if(!prev[id]||JSON.stringify(prev[id])!==JSON.stringify(next[id])){toWrite.push([id,next[id]]);}
    }
    for(const id of prevIds){if(!next[id])toDelete.push(id);}
    // 平行寫入 / 刪除
    const writeResults=await Promise.all(toWrite.map(([id,data])=>DB.set("activities",id,data)));
    await Promise.all(toDelete.map(id=>DB.del("activities",id)));
    const writeFailed=writeResults.find(r=>!(typeof r==="object"?r.ok:r));
    if(writeFailed){
      const errMsg=writeFailed?.err?.message||"未知錯誤";
      showToast(`❌ 雲端儲存失敗：${errMsg.slice(0,40)}`);
      setGroups(prev);
      return false;
    }
    return true;
  };
  const saveWishes=async(next)=>{setWishes(next);await DB.set("app","wishes",{data:next,updatedAt:Date.now()});};

  const getDates=(group)=>{
    if(!group?.dateStart)return null;
    const start=new Date(group.dateStart),end=group.dateEnd?new Date(group.dateEnd):start,ds=[];
    for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))ds.push(new Date(d).toISOString().slice(0,10));
    return ds.slice(0,90);
  };

  const buildCountMap=(joiners,dates)=>{
    const names=Object.keys(joiners),countMap={},intersect={};
    if(names.length===0)return{countMap,intersect};
    const cols=dates?dates.length:7;
    TIME_SLOTS.forEach(slot=>{Array.from({length:cols},(_,di)=>{
      const key=`${di}-${slot.key}`,cnt=names.filter(n=>joiners[n].slots?.[key]).length;
      if(cnt>0){countMap[key]=cnt;if(cnt===names.length)intersect[key]=true;}
    });});
    return{countMap,intersect};
  };

  const S={
    root:{minHeight:"100%",background:"#080d18",paddingBottom:80},
    topbar:{background:"#0f1729",borderBottom:"1px solid #1e2d45",padding:"18px 20px 0"},
    title:{margin:"0 0 14px",fontSize:22,fontWeight:900,fontFamily:"'Syne',sans-serif",background:"linear-gradient(90deg,#38bdf8,#818cf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"},
    nav:{display:"flex",gap:1,overflowX:"auto"},
    navBtn:(a)=>({padding:"12px 15px",border:"none",background:"transparent",color:a?"#38bdf8":"#6b8aa8",cursor:"pointer",fontWeight:a?700:500,fontSize:13,borderBottom:a?"2px solid #38bdf8":"2px solid transparent",whiteSpace:"nowrap",transition:"all .15s"}),
    card:{background:"#0f1729",border:"1px solid #1e2d45",borderRadius:14,padding:22,margin:"16px auto",maxWidth:740},
    label:{display:"block",fontSize:11,color:"#6b8aa8",marginBottom:5,fontWeight:700,letterSpacing:.6,textTransform:"uppercase"},
    input:{width:"100%",boxSizing:"border-box",background:"#080d18",border:"1px solid #1e2d45",borderRadius:8,padding:"10px 14px",color:"#dde8f5",fontSize:16,outline:"none"},
    textarea:{width:"100%",boxSizing:"border-box",background:"#080d18",border:"1px solid #1e2d45",borderRadius:8,padding:"10px 14px",color:"#dde8f5",fontSize:16,outline:"none",resize:"vertical",minHeight:72},
    btn:(v="primary")=>({padding:"10px 20px",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,transition:"all .15s",
      background:v==="primary"?"linear-gradient(90deg,#38bdf8,#0ea5e9)":v==="success"?"linear-gradient(90deg,#34d399,#10b981)":v==="danger"?"#dc2626":v==="warning"?"#d97706":v==="ghost"?"transparent":"#1e2d45",
      color:v==="ghost"?"#6b8aa8":"#fff",border:v==="ghost"?"1px solid #1e2d45":"none"}),
    badge:(c="#38bdf8")=>({display:"inline-block",background:c+"22",border:`1px solid ${c}55`,borderRadius:6,padding:"2px 10px",fontSize:12,color:c,fontWeight:700}),
    sT:{fontSize:18,fontWeight:800,fontFamily:"'Syne',sans-serif",margin:"0 0 16px",color:"#e2f0ff"},
    hr:{borderTop:"1px solid #1e2d45",margin:"14px 0"},
    g2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14},
    g3:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:14},
    hint:{fontSize:11,color:"#374a5e",marginTop:3},
  };
  const F=({label,required,hint,children})=>(
    <div><label style={S.label}>{label}{required&&<span style={{color:"#f87171"}}> *</span>}{hint&&<span style={{fontSize:10,color:"#374a5e",fontWeight:400,marginLeft:6,textTransform:"none"}}>{hint}</span>}</label>{children}</div>
  );

  // 日期輸入：可手動打字、可點 📅 開原生選擇器
  const DateInput=({value,onChange,min})=>{
    const dref=useRef(null);

          onClick={()=>{try{dref.current?.showPicker?.();}catch{}}}
        />
        <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:18,pointerEvents:"none"}}>📅</span>
      </div>
    );
  };

  // ── HOME ──
  const HomeTab=()=>{

                {g.category&&(()=>{const c=getCategory(g.category);return <span style={{background:c.color+"22",border:`1px solid ${c.color}55`,borderRadius:6,padding:"2px 8px",fontSize:11,color:c.color,fontWeight:700}}>{c.label}</span>;})()}
                {isExpired&&<span style={{background:"#37415133",border:"1px solid #64748b55",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#94a3b8",fontWeight:700}}>📦 已結束</span>}
                {!isExpired&&isConfirmed&&<span style={{background:"#34d39922",border:"1px solid #34d39955",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#34d399",fontWeight:700}}>✅ 已成團</span>}

        const g=groups[id];
        if((g.email||"").toLowerCase()===em){
          results.push({id,g,role:"organizer",name:g.name});
        }
        Object.keys(g.joiners||{}).forEach(n=>{
          if((g.joiners[n].email||"").toLowerCase()===em){
            results.push({id,g,role:"joiner",name:n});
          }
        });
      });
      setMyResults(results);
    };

    return(<div style={{padding:"0 10px"}}>
      {/* 使用教學 */}
      <div style={{...S.card,marginBottom:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setShowGuide(p=>!p)}>
          <h2 style={{...S.sT,margin:0}}>📖 使用教學 & 注意事項</h2>
          <span style={{color:"#38bdf8",fontSize:14}}>{showGuide?"▲ 收起":"▼ 展開"}</span>
        </div>
        {showGuide&&(
          <div style={{marginTop:16}}>
            <div style={{marginBottom:16}}>
              {[
                {icon:"🚀",title:"開團中",desc:"建立活動，設定日期、人數、費用，選限定或開放團，分享編號給朋友"},
                {icon:"📋",title:"報名活動",desc:"在首頁或報名活動頁點選活動，填寫姓名、信箱、可用時間，送出報名"},
                {icon:"🔐",title:"團主管理",desc:"輸入開團編號+密碼，管理跟團者、確定活動時間、標記已成團"},
                {icon:"🛡",title:"網頁管理員",desc:"使用管理員密碼登入，查看所有活動數據、刪除違規內容"},
                {icon:"🌟",title:"許願池",desc:"投入想玩的活動點子，其他人可以按讚支持，熱門願望顯示在首頁"},
                {icon:"📅",title:"Google Calendar",desc:"成團後開團者確定時間，所有參加者可一鍵匯出到 Google 行事曆"},
              ].map(({icon,title,desc})=>(
                <div key={title} style={{fontSize:13,color:"#6b8aa8",marginBottom:8,lineHeight:1.6}}>
                  {icon} <span style={{fontWeight:700,color:"#38bdf8"}}>{title}</span>：{desc}
                </div>
              ))}
            </div>
            <div style={{background:"#1a0a0a",border:"1px solid #f8717133",borderRadius:10,padding:14}}>
              <div style={{fontWeight:700,color:"#f87171",marginBottom:8,fontSize:13}}>⚠ 注意事項</div>
              {["信箱僅供活動通知使用，不會對外公開","限定團需輸入正確的跟團密碼才能加入","同名跟團者送出後會覆蓋原本資料，請確認姓名","許願池內容為公開顯示，請勿填寫個人敏感資訊","活動資料儲存在雲端，請妥善保管開團編號與密碼"].map((t,i)=>(
                <div key={i} style={{fontSize:12,color:"#9a6a6a",marginBottom:4}}>• {t}</div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* 開團中活動（直接在首頁顯示） */}
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <h2 style={{...S.sT,margin:0}}>🎪 開團中 <span style={{fontSize:13,fontWeight:400,color:"#6b8aa8"}}>({openIds.length})</span></h2>
          <button style={{...S.btn("ghost"),padding:"6px 12px",fontSize:12}} onClick={()=>setTab("register")}>🔍 搜尋 / 更多篩選 →</button>
        </div>
        {openIds.length===0?(
          <p style={{color:"#6b8aa8",fontSize:14}}>目前沒有進行中的活動，<span style={{color:"#38bdf8",cursor:"pointer",fontWeight:700}} onClick={()=>setTab("organizer")}>前往開團 →</span></p>
        ):(
          openIds.map((id,i)=><ActivityCard key={id} id={id} g={groups[id]} i={i}/>)
        )}
      </div>

      {/* 已成團 */}
      {confirmedIds.length>0&&(
        <div style={S.card}>
          <h2 style={S.sT}>✅ 已成團 <span style={{fontSize:13,fontWeight:400,color:"#6b8aa8"}}>({confirmedIds.length})</span></h2>
          {confirmedIds.map((id,i)=><ActivityCard key={id} id={id} g={groups[id]} i={i}/>)}
        </div>
      )}

      {/* 我參加過的活動 */}
      <div style={S.card}>
        <h2 style={S.sT}>📁 我參加過的活動</h2>
        <p style={{fontSize:13,color:"#6b8aa8",marginBottom:10}}>輸入報名時使用的信箱，找出你開過或跟過的活動</p>
        <div style={{display:"flex",gap:8}}>
          <input style={{...S.input,flex:1}} placeholder="your@email.com" value={myEmail} onChange={e=>setMyEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&queryMine()}/>
          <button style={S.btn("primary")} onClick={queryMine}>查詢</button>
        </div>
        {myResults!==null&&(
          <div style={{marginTop:14}}>
            {myResults.length===0?(
              <p style={{fontSize:13,color:"#6b8aa8"}}>此信箱沒有任何活動紀錄</p>
            ):myResults.map((r,i)=>{
              const c=getCategory(r.g.category);
              return(
                <div key={r.id+"-"+i} onClick={()=>setTab("view-"+r.id)} style={{background:"#080d18",border:"1px solid #1e2d45",borderRadius:10,padding:12,marginBottom:8,cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:r.role==="organizer"?"#38bdf822":"#34d39922",color:r.role==="organizer"?"#38bdf8":"#34d399",fontWeight:700}}>{r.role==="organizer"?"🚀 主揪":"🙋 跟團"}</span>
                      <span style={{fontWeight:700,fontSize:14}}>{r.g.activityName}</span>
                      <span style={{fontSize:11,color:c.color}}>{c.label}</span>
                    </div>
                    <span style={{fontSize:11,color:"#6b8aa8"}}>{fmt(r.g.dateStart)}</span>
                  </div>
                  <div style={{fontSize:11,color:"#6b8aa8",marginTop:4}}>編號 #{r.id} ｜ {r.g.status==="confirmed"?"✅ 已成團":"⏳ 進行中"}</div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* 許願排行 */}
      {wishes.length>0&&(
        <div style={S.card}>
          <h2 style={S.sT}>🌟 許願池排行</h2>
          <p style={{fontSize:12,color:"#6b8aa8",marginBottom:14}}>依按讚數排行，同讚數依時間先後</p>
          {[...wishes].sort((a,b)=>(b.likes||0)-(a.likes||0)||(a.time-b.time)).slice(0,5).map((w,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#080d18",border:"1px solid #1e2d45",borderRadius:10,padding:"10px 14px",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:18,fontWeight:900,color:i===0?"#fbbf24":i===1?"#9ca3af":i===2?"#b45309":"#374a5e",fontFamily:"monospace"}}>#{i+1}</span>
                <div><div style={{fontSize:13,fontWeight:600}}>{w.content}</div><div style={{fontSize:11,color:"#374a5e",marginTop:2}}>{new Date(w.time).toLocaleDateString("zh-TW")}</div></div>
              </div>
              <span style={{fontSize:13,color:"#a78bfa",fontWeight:700}}>❤️ {w.likes||0}</span>
            </div>
          ))}
          <button style={{...S.btn("ghost"),width:"100%",marginTop:8}} onClick={()=>setTab("wish")}>查看全部許願 →</button>
        </div>
      )}
    </div>);
  };

  // ── REGISTER（報名活動）──
  const RegisterTab=()=>{
    const [search,setSearch]=useState("");
    const [filterCat,setFilterCat]=useState("all");
    const [showArchived,setShowArchived]=useState(false);
    const today=new Date().toISOString().slice(0,10);
    const isArchived=(g)=>{
      const end=g.confirmed?.finalDate||g.dateEnd||g.dateStart;
      return end&&end<today;
    };
    const matchSearchCat=(id)=>{
      const g=groups[id];
      const q=search.trim().toLowerCase();
      if(q){
        const hay=`${id} ${g.activityName||""} ${g.name||""} ${g.location||""} ${g.description||""}`.toLowerCase();
        if(!hay.includes(q))return false;
      }
      if(filterCat!=="all"&&(g.category||"other")!==filterCat)return false;
      return true;
    };
    const liveIds=Object.keys(groups).filter(id=>matchSearchCat(id)&&!isArchived(groups[id]));
    const openIds=liveIds.filter(id=>groups[id].status!=="confirmed");
    const confirmedIds=liveIds.filter(id=>groups[id].status==="confirmed");
    const archivedIds=Object.keys(groups).filter(id=>matchSearchCat(id)&&isArchived(groups[id]));

    const ActivityCard=({id,g,i})=>{
      const jc=Object.keys(g.joiners||{}).length;
      const maxP=g.maxPeople?parseInt(g.maxPeople):null;
      const joinerLimit=maxP?maxP-1:null;
      const isFull=joinerLimit&&jc>=joinerLimit;
      const isConfirmed=g.status==="confirmed";
      const today=new Date().toISOString().slice(0,10);
      const endDate=g.confirmed?.finalDate||g.dateEnd||g.dateStart;
      const isExpired=endDate&&endDate<today;
      return(
        <div onClick={()=>setTab("view-"+id)} style={{background:"#080d18",border:`1px solid ${isExpired?"#37415133":isConfirmed?"#34d39944":"#1e2d45"}`,borderRadius:12,padding:14,marginBottom:10,cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start",opacity:isExpired?0.6:1}}>
          {(()=>{const img=getImages(g)[0];return img?<img src={img} alt="" style={{width:88,height:88,objectFit:"cover",borderRadius:10,flexShrink:0,border:"1px solid #1e2d45"}}/>:null;})()}
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={S.badge(COLORS[i%COLORS.length])}># {id}</span>
                <span style={{fontWeight:800,fontSize:15}}>{g.activityName}</span>
                {g.category&&(()=>{const c=getCategory(g.category);return <span style={{background:c.color+"22",border:`1px solid ${c.color}55`,borderRadius:6,padding:"2px 8px",fontSize:11,color:c.color,fontWeight:700}}>{c.label}</span>;})()}
                {isExpired&&<span style={{background:"#37415133",border:"1px solid #64748b55",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#94a3b8",fontWeight:700}}>📦 已結束</span>}
                {!isExpired&&isConfirmed&&<span style={{background:"#34d39922",border:"1px solid #34d39955",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#34d399",fontWeight:700}}>✅ 已成團</span>}
                {!isExpired&&isFull&&!isConfirmed&&<span style={{background:"#dc262622",border:"1px solid #dc262655",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#f87171",fontWeight:700}}>額滿</span>}
                {g.groupType==="private"&&<span style={{background:"#a78bfa22",border:"1px solid #a78bfa55",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#a78bfa",fontWeight:700}}>🔒 限定</span>}
              </div>
              <span style={{fontSize:12,color:"#6b8aa8"}}>{fmt(g.dateStart)}{g.dateEnd&&g.dateEnd!==g.dateStart?` ～ ${fmt(g.dateEnd)}`:""}</span>
            </div>
            <div style={{marginTop:6,fontSize:12,color:"#8aaac8"}}>
              👤 {g.name} &nbsp;|&nbsp; 🙋 <span style={{color:isFull?"#f87171":"#8aaac8"}}>{jc}{joinerLimit?`/${joinerLimit}`:""}人</span>
              {g.location&&<> &nbsp;|&nbsp; 📍 {g.location}</>}{g.cost&&<> &nbsp;|&nbsp; 💰 {g.cost}</>}
            </div>
            {isConfirmed&&g.confirmed?.finalDate&&(
              <div style={{marginTop:6,fontSize:12,color:"#34d399"}}>📅 確定時間：{g.confirmed.finalDate} {g.confirmed.finalSlot}</div>
            )}
          </div>
        </div>
      );
    };

    return(<div style={{padding:"0 10px"}}>
      {/* 搜尋與篩選 */}
      <div style={S.card}>
        <F label="🔍 搜尋活動"><input style={S.input} placeholder="輸入活動名稱、主揪、地點、編號…" value={search} onChange={e=>setSearch(e.target.value)}/></F>
        <div style={{marginTop:10}}>
          <label style={S.label}>分類篩選</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            <div onClick={()=>setFilterCat("all")} style={{padding:"6px 12px",borderRadius:8,border:`2px solid ${filterCat==="all"?"#38bdf8":"#1e2d45"}`,background:filterCat==="all"?"#0c2a4a":"#080d18",cursor:"pointer",fontSize:12,fontWeight:700,color:filterCat==="all"?"#38bdf8":"#6b8aa8"}}>全部</div>
            {CATEGORIES.map(c=>(
              <div key={c.key} onClick={()=>setFilterCat(c.key)} style={{padding:"6px 12px",borderRadius:8,border:`2px solid ${filterCat===c.key?c.color:"#1e2d45"}`,background:filterCat===c.key?c.color+"22":"#080d18",cursor:"pointer",fontSize:12,fontWeight:700,color:filterCat===c.key?c.color:"#6b8aa8"}}>{c.label}</div>
            ))}
          </div>
        </div>
      </div>

      {/* 開團中 */}
      <div style={S.card}>
        <h2 style={S.sT}>🎪 開團中</h2>
        {openIds.length===0&&<p style={{color:"#6b8aa8",fontSize:14}}>目前沒有進行中的活動</p>}
        {openIds.map((id,i)=><ActivityCard key={id} id={id} g={groups[id]} i={i}/>)}
      </div>

      {/* 已成團 */}
      {confirmedIds.length>0&&(
        <div style={S.card}>
          <h2 style={S.sT}>✅ 已成團</h2>
          {confirmedIds.map((id,i)=><ActivityCard key={id} id={id} g={groups[id]} i={i}/>)}
        </div>
      )}

      {/* 已結束 */}
      {archivedIds.length>0&&(
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setShowArchived(p=>!p)}>
            <h2 style={{...S.sT,margin:0}}>📦 已結束活動（{archivedIds.length}）</h2>
            <span style={{color:"#38bdf8",fontSize:14}}>{showArchived?"▲ 收起":"▼ 展開"}</span>
          </div>
          {showArchived&&<div style={{marginTop:12,opacity:0.7}}>{archivedIds.map((id,i)=><ActivityCard key={id} id={id} g={groups[id]} i={i}/>)}</div>}
        </div>
      )}

      {liveIds.length===0&&archivedIds.length===0&&(
        <div style={S.card}>
          <p style={{color:"#6b8aa8",fontSize:14,textAlign:"center"}}>沒有符合條件的活動，<span style={{color:"#38bdf8",cursor:"pointer",fontWeight:700}} onClick={()=>setTab("organizer")}>前往開團 →</span></p>
        </div>
      )}
    </div>);
  };

  // ── ORGANIZER ──
  const OrganizerTab=()=>{
    // local state 初始化自 ref（ref 跨 remount 保留資料）
    const [form,setFormRaw]=useState(()=>orgFormRef.current);
    const setForm=(v)=>{setFormRaw(p=>{const n=typeof v==="function"?v(p):v;orgFormRef.current=n;return n;});};
    const [organizerSlots,setOrgSlotsRaw]=useState(()=>orgSlotsRef.current);
    const setOrganizerSlots=(v)=>{setOrgSlotsRaw(p=>{const n=typeof v==="function"?v(p):v;orgSlotsRef.current=n;return n;});};
    const [done,setDoneRaw]=useState(()=>orgDoneRef.current);
    const setDone=(v)=>{orgDoneRef.current=v;setDoneRaw(v);};
    const [idErr,setIdErrRaw]=useState(()=>orgIdErrRef.current);
    const setIdErr=(v)=>{orgIdErrRef.current=v;setIdErrRaw(v);};
    const [imgLoading,setImgLoadingRaw]=useState(()=>orgImgLoadingRef.current);
    const setImgLoading=(v)=>{orgImgLoadingRef.current=v;setImgLoadingRaw(v);};
    useEffect(()=>{
      if(template){
        const t=template;
        const f={...initForm(),name:t.name||"",email:t.email||"",contact:t.contact||"",hours:t.hours||"",location:t.location||"",activityName:t.activityName||"",description:t.description||"",cost:t.cost||"",maxPeople:t.maxPeople||"",groupType:t.groupType||"open",category:t.category||"other",images:getImages(t),note:t.note||""};
        setForm(f); setOrganizerSlots({}); setDone(null); setIdErr("");
        setTemplate(null);
      }
    },[]);
    const set=(k,v)=>setForm(p=>({...p,[k]:v}));
    const onPickImage=async(e)=>{
      const file=e.target.files?.[0]; e.target.value="";
      if(!file)return;
      if(file.size>10*1024*1024){showToast("❌ 圖片太大（>10MB）");return;}
      const current=getImages(form);
      if(current.length>=3){showToast("❌ 最多 3 張圖片");return;}
      setImgLoading(true);
      try{const dataUrl=await compressImage(file,700,0.65); set("images",[...current,dataUrl]);}
      catch{showToast("❌ 圖片處理失敗");}
      finally{setImgLoading(false);}
    };
    const submit=async()=>{
      if(!form.id.trim()){showToast("❗ 請填寫開團編號");return;}
      if(!form.password.trim()){showToast("❗ 請設定管理密碼");return;}
      if(!form.name.trim()){showToast("❗ 請填寫姓名");return;}
      if(!form.email.trim()||!isValidEmail(form.email)){showToast("❗ 請填寫有效信箱");return;}
      if(!form.activityName.trim()){showToast("❗ 請填寫活動名稱");return;}
      if(form.groupType==="private"&&!form.joinPassword.trim()){showToast("❗ 限定團請設定跟團密碼");return;}
      const id=form.id.trim().toLowerCase();
      if(groups[id]){setIdErr("此編號已被使用");return;}
      setIdErr("");
      const hashedPw=await sha256(form.password);
      const hashedJoin=form.joinPassword?await sha256(form.joinPassword):"";
      const next={...groups,[id]:{...form,id,password:hashedPw,joinPassword:hashedJoin,organizerSlots,joiners:{},createdAt:Date.now(),status:"open"}};
      const ok=await saveGroups(next);
      if(!ok)return; // 儲存失敗，不進入完成頁
      setDone(id); showToast("✅ 開團成功！");
    };
    if(done)return(<div style={S.card}><div style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{fontSize:48}}>🎉</div>
      <h2 style={{...S.sT,textAlign:"center"}}>開團成功！</h2>
      <p style={{color:"#6b8aa8"}}>開團編號：</p>
      <div style={{fontSize:32,fontWeight:900,color:"#38bdf8",letterSpacing:4,fontFamily:"monospace",margin:"10px 0"}}>{done}</div>
      <div style={{background:"#1e0a0a",border:"1px solid #f8717144",borderRadius:8,padding:"10px 16px",margin:"0 auto 16px",maxWidth:360,fontSize:13,color:"#f87171"}}>⚠ 請記住管理密碼！{form.groupType==="private"&&<><br/>跟團密碼：<b>{form.joinPassword}</b></>}</div>
      <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:20}}>
        <button style={S.btn("secondary")} onClick={()=>{const f=initForm();setForm(f);setOrganizerSlots({});setDone(null);setIdErr("");}}>再開一團</button>
        <button style={S.btn("primary")} onClick={()=>setTab("manage")}>前往管理頁面</button>
      </div>
    </div></div>);
    return(<div style={S.card}>
      <h2 style={S.sT}>🚀 開團中</h2>
      {/* 開放/限定 */}
      <div style={{marginBottom:14}}>
        <label style={S.label}>團的類型 <span style={{color:"#f87171"}}>*</span></label>
        <div style={{display:"flex",gap:10}}>
          {[["open","🌐 開放團","任何人都可以跟團"],["private","🔒 限定團","需要輸入跟團密碼"]].map(([v,label,desc])=>(
            <div key={v} onClick={()=>set("groupType",v)} style={{flex:1,padding:14,borderRadius:10,border:`2px solid ${form.groupType===v?"#38bdf8":"#1e2d45"}`,background:form.groupType===v?"#0c2a4a":"#080d18",cursor:"pointer"}}>
              <div style={{fontWeight:700,fontSize:13,color:form.groupType===v?"#38bdf8":"#dde8f5"}}>{label}</div>
              <div style={{fontSize:11,color:"#6b8aa8",marginTop:3}}>{desc}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={S.g2}>
        <F label="開團編號" required><input style={{...S.input,borderColor:idErr?"#f87171":"#1e2d45"}} placeholder="自訂，例：summer2025" value={form.id} onChange={e=>{set("id",e.target.value);setIdErr("");}}/>{idErr&&<div style={{color:"#f87171",fontSize:11,marginTop:4}}>⚠ {idErr}</div>}</F>
        <F label="管理密碼" required><input type="password" style={S.input} placeholder="開團管理用密碼" value={form.password} onChange={e=>set("password",e.target.value)}/></F>
      </div>
      {form.groupType==="private"&&(
        <div style={{marginBottom:14}}><F label="跟團密碼" required><input style={S.input} placeholder="跟團者需要輸入此密碼" value={form.joinPassword} onChange={e=>set("joinPassword",e.target.value)}/></F></div>
      )}
      <div style={S.g2}>
        <F label="開團者姓名" required><input style={S.input} placeholder="你的名字" value={form.name} onChange={e=>set("name",e.target.value)}/></F>
        <F label="活動名稱" required><input style={S.input} placeholder="例：期末慶功宴" value={form.activityName} onChange={e=>set("activityName",e.target.value)}/></F>
      </div>
      <div style={{marginBottom:14}}>
        <label style={S.label}>活動分類</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {CATEGORIES.map(c=>(
            <div key={c.key} onClick={()=>set("category",c.key)} style={{padding:"8px 14px",borderRadius:8,border:`2px solid ${form.category===c.key?c.color:"#1e2d45"}`,background:form.category===c.key?c.color+"22":"#080d18",cursor:"pointer",fontSize:13,fontWeight:700,color:form.category===c.key?c.color:"#6b8aa8"}}>{c.label}</div>
          ))}
        </div>
      </div>
      <div style={S.g2}>
        <F label="信箱" required hint="僅供活動通知"><input type="email" style={S.input} placeholder="your@email.com" value={form.email} onChange={e=>set("email",e.target.value)}/></F>
        <F label="聯絡方式" hint="選填，如 IG、Line ID"><input style={S.input} placeholder="例：@instagram_id" value={form.contact} onChange={e=>set("contact",e.target.value)}/></F>
      </div>
      <div style={S.g2}>
        <F label="活動開始日期"><DateInput value={form.dateStart} onChange={v=>set("dateStart",v)}/></F>
        <F label="活動結束日期"><DateInput value={form.dateEnd} min={form.dateStart} onChange={v=>set("dateEnd",v)}/></F>
      </div>
      <div style={S.g3}>
        <F label="預計時數"><input type="number" style={S.input} placeholder="例：3" min={0} value={form.hours} onChange={e=>set("hours",e.target.value)}/></F>
        <F label="活動費用"><input style={S.input} placeholder="例：NT$500" value={form.cost} onChange={e=>set("cost",e.target.value)}/></F>
        <F label="人數上限（含主揪）"><input type="number" style={S.input} placeholder="例：20" min={1} value={form.maxPeople} onChange={e=>set("maxPeople",e.target.value)}/><div style={S.hint}>跟團上限 = 此數字 - 1</div></F>
      </div>
      <div style={{marginBottom:14}}><F label="活動地點"><input style={S.input} placeholder="例：台北市信義區" value={form.location} onChange={e=>set("location",e.target.value)}/></F></div>
      <F label="活動說明"><textarea style={S.textarea} placeholder="詳細描述活動…" value={form.description} onChange={e=>set("description",e.target.value)}/></F>
      <div style={{height:14}}/>
      <F label="備註" hint="選填，主揪想補充的資訊（跟團者看得到）"><textarea style={S.textarea} placeholder="例：下雨改期、自備餐具、有寵物…" value={form.note} onChange={e=>set("note",e.target.value)}/></F>
      <div style={{marginTop:14}}>
        <label style={S.label}>示意圖（選填，最多 3 張）</label>
        {(()=>{const imgs=getImages(form);return(<>
          {imgs.length>0&&(
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
              {imgs.map((src,idx)=>(
                <div key={idx} style={{position:"relative",width:imgs.length===1?"100%":"calc(50% - 4px)"}}>
                  <img src={src} alt={`圖${idx+1}`} style={{width:"100%",height:imgs.length===1?260:140,objectFit:"cover",borderRadius:10,border:"1px solid #1e2d45",display:"block"}}/>
                  <button type="button" onClick={()=>{const n=[...imgs];n.splice(idx,1);set("images",n);}} style={{position:"absolute",top:6,right:6,background:"#dc2626",color:"#fff",border:"none",borderRadius:8,padding:"4px 8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕</button>
                </div>
              ))}
            </div>
          )}
          {imgs.length<3&&(
            <label style={{display:"block",background:"#080d18",border:"2px dashed #1e2d45",borderRadius:10,padding:"16px 14px",textAlign:"center",cursor:"pointer",color:"#6b8aa8",fontSize:13}}>
              {imgLoading?"⏳ 處理中…":`📷 ${imgs.length>0?`再加一張（${imgs.length}/3）`:"點此上傳活動示意圖"}`}
              <input type="file" accept="image/*" onChange={onPickImage} style={{display:"none"}}/>
            </label>
          )}
        </>);})()}
        <div style={{fontSize:11,color:"#374a5e",marginTop:4}}>自動壓縮，建議原檔 &lt; 10MB</div>
      </div>
      <div style={{height:20}}/>
      <div style={{background:"#080d18",border:"1px solid #38bdf833",borderRadius:12,padding:16}}>
        <div style={{fontWeight:700,fontSize:14,color:"#38bdf8",marginBottom:4}}>📅 主揪可以的時間 <span style={{fontSize:11,color:"#374a5e",fontWeight:400}}>(選填)</span></div>
        {form.dateStart?<SlotPicker dates={getDates(form)} mySlots={organizerSlots} setMySlots={setOrganizerSlots}/>:<div style={{fontSize:12,color:"#374a5e",padding:"12px 0"}}>請先填寫活動日期</div>}
      </div>
      <div style={{height:16}}/>
      <button style={{...S.btn("primary"),width:"100%",padding:"13px"}} onClick={submit}>🚀 開團！</button>
    </div>);
  };

  // ── VIEW (活動詳情 + 跟團入口) ──
  const ViewTab=({gid})=>{
    const [localGroup,setLocalGroup]=useState(null);
    const [joinStep,setJoinStep]=useState(0); // 0=看詳情 1=驗證密碼(限定) 2=填資料 3=已成團報名 4=候補填資料
    const [joinPw,setJoinPw]=useState("");
    const [name,setName]=useState(""),[email,setEmail]=useState(""),[contact,setContact]=useState(""),[slots,setSlots]=useState({}),[note,setNote]=useState("");
    const [submitting,setSubmitting]=useState(false),[done,setDone]=useState(false),[doneMode,setDoneMode]=useState("joiner");
    const [myCheckEmail,setMyCheckEmail]=useState("");
    const [myEntry,setMyEntry]=useState(null);
    // 限定團需解鎖才能看參加者
    const [unlocked,setUnlocked]=useState(false);
    const [unlockPw,setUnlockPw]=useState("");

    useEffect(()=>{
      if(_x()?.ready){
        const unsub=_x().l("activities",gid,(data)=>{if(data)setLocalGroup(data);});
        return unsub;
      }else setLocalGroup(groups[gid]||null);
    },[gid]);

    const group=localGroup||groups[gid];
    if(!group)return<div style={{...S.card,margin:"16px 10px"}}><p style={{color:"#f87171"}}>找不到此活動。</p></div>;

    const joiners=group.joiners||{},names=Object.keys(joiners);
    const dates=getDates(group);
    const hasOrgSlots=group.organizerSlots&&Object.keys(group.organizerSlots).length>0;
    const allParticipants=hasOrgSlots?{[group.name+"（主揪）"]:{slots:group.organizerSlots},...joiners}:joiners;
    const {countMap,intersect}=buildCountMap(allParticipants,dates);
    const totalCount=Object.keys(allParticipants).length;
    const maxP=group.maxPeople?parseInt(group.maxPeople):null;
    const joinerLimit=maxP?maxP-1:null;
    const joinerCount=names.length;
    const isExisting=name.trim()&&!!joiners[name.trim()];
    const isFull=joinerLimit!==null&&joinerCount>=joinerLimit&&!isExisting;
    const isConfirmed=group.status==="confirmed";
    // 限定團：只有輸入密碼解鎖、已用信箱查到自己有報名、或者開放團才顯示參加者
    const isPrivate=group.groupType==="private";
    const canSeeParticipants=!isPrivate||unlocked||(myEntry&&myEntry.name);

    const intersectList=[];
    if(totalCount>1)(dates||DAYS_SHORT).forEach((d,di)=>{
      TIME_SLOTS.forEach(slot=>{
        if(intersect[`${di}-${slot.key}`]){
          const lbl=dates?(()=>{const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}(${DAYS_SHORT[dt.getDay()===0?6:dt.getDay()-1]})`;})():`週${DAYS_SHORT[di]}`;
          intersectList.push({label:`${lbl} ${slot.label}（${slot.time}）`,date:d,slotLabel:slot.label,slotTime:slot.time});
        }
      });
    });

    const submitJoin=async()=>{
      if(!name.trim()){showToast("❗ 請填寫姓名");return;}
      if(!email.trim()||!isValidEmail(email)){showToast("❗ 請填寫有效信箱");return;}
      setSubmitting(true);
      const latest=await getLatestSafe();
      const latestGroup=latest[gid];
      if(!latestGroup){showToast("❌ 活動不存在");setSubmitting(false);return;}
      const latestJoiners=latestGroup.joiners||{};
      const latestCount=Object.keys(latestJoiners).length;
      const latestIsExisting=!!latestJoiners[name.trim()];
      const latestIsFull=joinerLimit!==null&&latestCount>=joinerLimit&&!latestIsExisting;
      if(latestIsFull){showToast("❌ 很抱歉，名額已滿！");setSubmitting(false);return;}
      const next={...latest,[gid]:{...latestGroup,joiners:{...latestJoiners,[name.trim()]:{slots,note,email,contact,joinedAt:Date.now()}}}};
      await saveGroups(next);
      setDoneMode("joiner");setDone(true);showToast("✅ 跟團成功！");setSubmitting(false);
    };

    const submitWaitlist=async()=>{
      if(!name.trim()){showToast("❗ 請填寫姓名");return;}
      if(!email.trim()||!isValidEmail(email)){showToast("❗ 請填寫有效信箱");return;}
      setSubmitting(true);
      const latest=await getLatestSafe();
      const latestGroup=latest[gid];
      if(!latestGroup){showToast("❌ 活動不存在");setSubmitting(false);return;}
      const waitlist=latestGroup.waitlist||{};
      const next={...latest,[gid]:{...latestGroup,waitlist:{...waitlist,[name.trim()]:{slots,note,email,contact,joinedAt:Date.now()}}}};
      await saveGroups(next);
      setDoneMode("waitlist");setDone(true);showToast("⏳ 已加入候補！");setSubmitting(false);
    };

    const submitRegister=async()=>{
      if(!name.trim()){showToast("❗ 請填寫姓名");return;}
      if(!email.trim()||!isValidEmail(email)){showToast("❗ 請填寫有效信箱");return;}
      if(!contact.trim()){showToast("❗ 請填寫聯絡方式");return;}
      setSubmitting(true);
      const latest=await getLatestSafe();
      const latestGroup=latest[gid];
      const latestJoiners=latestGroup.joiners||{};
      const next={...latest,[gid]:{...latestGroup,joiners:{...latestJoiners,[name.trim()]:{email,contact,registeredAt:Date.now(),isRegistered:true}}}};
      await saveGroups(next);
      setDone(true);showToast("✅ 報名成功！");setSubmitting(false);
    };

    if(done)return(<div style={{...S.card,margin:"16px 10px"}}><div style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{fontSize:48}}>{doneMode==="waitlist"?"⏳":isConfirmed?"🎉":"🙌"}</div>
      <h2 style={{...S.sT,textAlign:"center"}}>{doneMode==="waitlist"?"已加入候補！":isConfirmed?"報名成功！":"跟團成功！"}</h2>
      <p style={{color:"#6b8aa8",marginBottom:16}}>{doneMode==="waitlist"?"當有人退出，主揪會聯繫你遞補。":isConfirmed?"已報名，等開團者通知！":"已送出可用時間，等開團者確定時間後會再通知"}</p>
      {isConfirmed&&group.confirmed?.finalDate&&(
        <div style={{background:"#0a1f0a",border:"1px solid #34d39944",borderRadius:10,padding:14,marginBottom:14,textAlign:"left"}}>
          <div style={{fontWeight:700,color:"#34d399",marginBottom:6,fontSize:13,textAlign:"center"}}>📅 活動資訊</div>
          <div style={{fontSize:13,color:"#bae6fd",marginBottom:4,textAlign:"center"}}>{group.confirmed.finalDate} {group.confirmed.finalSlot}</div>
          {group.confirmed.finalLocation&&<div style={{fontSize:13,color:"#bae6fd",marginBottom:12,textAlign:"center"}}>📍 {group.confirmed.finalLocation}</div>}
          <div style={{fontSize:12,color:"#6b8aa8",fontWeight:700,marginBottom:8,textAlign:"center"}}>加入行事曆提醒你</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center"}}>
            <button style={S.btn("success")} onClick={()=>exportToGCal(group.activityName,group.confirmed.finalDate,group.confirmed.finalSlot,TIME_SLOTS.find(s=>s.label===group.confirmed.finalSlot)?.time,group.confirmed.finalLocation||group.location)}>📅 Google Calendar</button>
            <button style={S.btn("secondary")} onClick={()=>downloadICS(group.activityName,group.confirmed.finalDate,group.confirmed.finalSlot,TIME_SLOTS.find(s=>s.label===group.confirmed.finalSlot)?.time,group.confirmed.finalLocation||group.location,group.description)}>📥 iCal / Apple 行事曆</button>
          </div>
        </div>
      )}
      <div><button style={S.btn("ghost")} onClick={()=>{setDone(false);setJoinStep(0);setName("");setEmail("");setContact("");setSlots({});setNote("");}}>← 返回活動</button></div>
    </div></div>);

    return(<div style={{margin:"16px 10px"}}>
      {/* 活動資訊卡 */}
      <div style={S.card}>
        {(()=>{const imgs=getImages(group);if(!imgs.length)return null;return(
          <div style={{marginBottom:14,marginTop:-6,display:"flex",gap:6,flexWrap:"wrap"}}>
            {imgs.map((src,i)=>(
              <img key={i} src={src} alt={`${group.activityName} ${i+1}`} style={{width:imgs.length===1?"100%":"calc(50% - 3px)",maxHeight:imgs.length===1?360:200,objectFit:"cover",borderRadius:12,border:"1px solid #1e2d45"}}/>
            ))}
          </div>
        );})()}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <h2 style={{...S.sT,margin:0}}>{group.activityName}</h2>
            {isConfirmed&&<span style={{background:"#34d39922",border:"1px solid #34d39955",borderRadius:6,padding:"3px 10px",fontSize:12,color:"#34d399",fontWeight:700}}>✅ 已成團</span>}
          </div>
          <span style={S.badge()}># {gid}</span>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"5px 14px",fontSize:12,color:"#8aaac8",marginBottom:10}}>
          <span>👤 {group.name}</span>
          {group.contact&&<span>📱 {group.contact}</span>}
          {group.dateStart&&<span>📅 {fmt(group.dateStart)}{group.dateEnd&&group.dateEnd!==group.dateStart?` ～ ${fmt(group.dateEnd)}`:""}</span>}
          {group.hours&&<span>⏱ {group.hours}h</span>}
          {group.location&&<span>📍 {group.location}</span>}
          {group.cost&&<span>💰 {group.cost}</span>}
          {maxP&&<span>👥 上限{maxP}人</span>}
          {group.category&&(()=>{const c=getCategory(group.category);return <span style={{color:c.color}}>{c.label}</span>;})()}
        </div>
        {group.description&&<p style={{fontSize:12,color:"#6b8aa8",marginBottom:10,whiteSpace:"pre-wrap"}}>{group.description}</p>}
        {group.note&&(
          <div style={{background:"#1a1205",border:"1px solid #fbbf2444",borderRadius:10,padding:12,marginBottom:10}}>
            <div style={{fontWeight:700,color:"#fbbf24",marginBottom:6,fontSize:12}}>📝 主揪備註</div>
            <div style={{fontSize:12,color:"#bae6fd",whiteSpace:"pre-wrap"}}>{group.note}</div>
          </div>
        )}

        {/* 已成團：確定資訊（匯出行事曆按鈕改放到報名完成頁） */}
        {isConfirmed&&group.confirmed?.finalDate&&(
          <div style={{background:"#0a1f0a",border:"1px solid #34d39944",borderRadius:10,padding:14,marginBottom:10}}>
            <div style={{fontWeight:700,color:"#34d399",marginBottom:8,fontSize:13}}>✅ 確定活動資訊</div>
            <div style={{fontSize:13,color:"#bae6fd",marginBottom:4}}>📅 {group.confirmed.finalDate} {group.confirmed.finalSlot}</div>
            {group.confirmed.finalLocation&&<div style={{fontSize:13,color:"#bae6fd"}}>📍 {group.confirmed.finalLocation}</div>}
          </div>
        )}

        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button style={S.btn("ghost")} onClick={()=>setTab("home")}>← 返回列表</button>
        </div>
      </div>

      {/* 開放團：大家選的時段（限定團隱藏） */}
      {!isPrivate&&(names.length>0||hasOrgSlots)&&joinStep===0&&(
        <div style={S.card}>
          <h3 style={{...S.sT,fontSize:15}}>📅 大家可以的時段 <span style={{fontSize:11,fontWeight:400,color:"#6b8aa8"}}>（{names.length} 人已填）</span></h3>
          <SlotPicker dates={dates} readOnly countMap={countMap} maxCount={totalCount} intersect={intersect} joiners={allParticipants}/>
          {intersectList.length>0&&(
            <div style={{marginTop:12,padding:12,background:"#0a1628",border:"1px solid #38bdf844",borderRadius:10}}>
              <div style={{fontWeight:700,color:"#38bdf8",marginBottom:6,fontSize:12}}>✨ 所有人都可以的時段</div>
              {intersectList.map((s,i)=><div key={i} style={{fontSize:12,color:"#bae6fd",marginBottom:2}}>• {s.label}</div>)}
            </div>
          )}
          <div style={{fontSize:10,color:"#374a5e",marginTop:6}}>點格子可查看該時段誰能來</div>
        </div>
      )}

      {/* 跟團 / 報名區 */}
      {joinStep===0&&(
        <div style={S.card}>
          {isConfirmed?(
            group.confirmed?.allowJoin===false?(
              <div style={{textAlign:"center",padding:20,color:"#6b8aa8",fontSize:14}}>此活動已停止接受報名</div>
            ):(
              <>
                <h3 style={{fontWeight:700,fontSize:15,marginBottom:12,color:"#34d399"}}>🎉 報名參加已成團活動</h3>
                <div style={{fontSize:13,color:"#6b8aa8",marginBottom:16}}>填寫資料後開團者會通知你活動詳情</div>
                <button style={{...S.btn("success"),width:"100%"}} onClick={()=>setJoinStep(3)}>立即報名 →</button>
              </>
            )
          ):(
            isFull&&!isExisting?(
              <div style={{textAlign:"center",padding:20}}>
                <div style={{fontSize:36,marginBottom:8}}>🚫</div>
                <div style={{fontSize:16,fontWeight:800,color:"#f87171",marginBottom:6}}>名額已滿</div>
                <div style={{fontSize:13,color:"#9a4a4a",marginBottom:14}}>{joinerCount}/{joinerLimit} 人 ｜ 候補中：{Object.keys(group.waitlist||{}).length}</div>
                <button style={{...S.btn("warning"),width:"100%"}} onClick={()=>setJoinStep(group.groupType==="private"?1:4)}>⏳ 加入候補名單</button>
              </div>
            ):(
              <>
                <h3 style={{fontWeight:700,fontSize:15,marginBottom:8,color:"#38bdf8"}}>🙋 我要跟團</h3>
                {joinerLimit&&<div style={{fontSize:12,color:isFull?"#f87171":"#38bdf8",marginBottom:12}}>目前 {joinerCount}/{joinerLimit} 人</div>}
                {group.groupType==="private"?(
                  <button style={{...S.btn("primary"),width:"100%"}} onClick={()=>setJoinStep(1)}>輸入跟團密碼 →</button>
                ):(
                  <button style={{...S.btn("primary"),width:"100%"}} onClick={()=>setJoinStep(2)}>填寫跟團資料 →</button>
                )}
              </>
            )
          )}
        </div>
      )}

      {/* 查詢 / 取消我的報名 */}
      {joinStep===0&&(
        <div style={S.card}>
          <h3 style={{...S.sT,marginBottom:10,fontSize:15}}>🔎 我已經報名了？查詢／取消</h3>
          <div style={{fontSize:12,color:"#6b8aa8",marginBottom:10}}>輸入報名時用的信箱</div>
          <div style={{display:"flex",gap:8}}>
            <input style={{...S.input,flex:1}} placeholder="your@email.com" value={myCheckEmail} onChange={e=>setMyCheckEmail(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){const em=myCheckEmail.trim().toLowerCase();if(!em||!isValidEmail(em)){showToast("❗ 請輸入有效信箱");return;}let found=null;for(const n of Object.keys(group.joiners||{})){if((group.joiners[n].email||"").toLowerCase()===em){found={name:n,data:group.joiners[n],waitlist:false};break;}}if(!found)for(const n of Object.keys(group.waitlist||{})){if((group.waitlist[n].email||"").toLowerCase()===em){found={name:n,data:group.waitlist[n],waitlist:true};break;}}if(found)setUnlocked(true);setMyEntry(found||{notFound:true});}}}/>
            <button style={S.btn("primary")} onClick={()=>{const em=myCheckEmail.trim().toLowerCase();if(!em||!isValidEmail(em)){showToast("❗ 請輸入有效信箱");return;}let found=null;for(const n of Object.keys(group.joiners||{})){if((group.joiners[n].email||"").toLowerCase()===em){found={name:n,data:group.joiners[n],waitlist:false};break;}}if(!found)for(const n of Object.keys(group.waitlist||{})){if((group.waitlist[n].email||"").toLowerCase()===em){found={name:n,data:group.waitlist[n],waitlist:true};break;}}if(found)setUnlocked(true);setMyEntry(found||{notFound:true});}}>查詢</button>
          </div>
          {myEntry?.notFound&&(<p style={{fontSize:12,color:"#6b8aa8",marginTop:10}}>此信箱沒有報名紀錄</p>)}
          {myEntry?.name&&(
            <div style={{marginTop:12,background:"#080d18",border:"1px solid #1e2d45",borderRadius:10,padding:12}}>
              <div style={{fontSize:13,fontWeight:700,color:"#38bdf8",marginBottom:4}}>{myEntry.waitlist?"⏳ 候補中":"✅ 已報名"} — {myEntry.name}</div>
              <div style={{fontSize:11,color:"#6b8aa8"}}>信箱：{myEntry.data.email}{myEntry.data.contact?` ｜ ${myEntry.data.contact}`:""}</div>
              {myEntry.data.note&&<div style={{fontSize:11,color:"#6b8aa8",marginTop:3}}>備註：{myEntry.data.note}</div>}
              <button style={{...S.btn("danger"),marginTop:10,padding:"6px 14px",fontSize:12}} onClick={async()=>{
                if(!window.confirm(`確定取消「${myEntry.name}」的報名？`))return;
                const latest=await getLatestSafe();
                const lg=latest[gid]; if(!lg)return;
                const field=myEntry.waitlist?"waitlist":"joiners";
                const n={...(lg[field]||{})}; delete n[myEntry.name];
                const nextG={...latest,[gid]:{...lg,[field]:n}};
                const ok=await saveGroups(nextG);
                if(ok){setMyEntry(null);setMyCheckEmail("");showToast("✅ 已取消報名");}
              }}>🗑 取消我的報名</button>
            </div>
          )}
        </div>
      )}

      {/* 限定團密碼驗證 */}
      {joinStep===1&&(
        <div style={S.card}>
          <h3 style={{fontWeight:700,fontSize:15,marginBottom:12,color:"#a78bfa"}}>🔒 輸入跟團密碼</h3>
          <F label="跟團密碼" required><input type="password" style={S.input} placeholder="請輸入開團者提供的密碼" value={joinPw} onChange={e=>setJoinPw(e.target.value)}/></F>
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button style={S.btn("ghost")} onClick={()=>setJoinStep(0)}>← 返回</button>
            <button style={{...S.btn("primary"),flex:1}} onClick={async()=>{if(await matchPw(joinPw,group.joinPassword)){setUnlocked(true);setJoinStep(2);}else showToast("❌ 密碼錯誤");}}>確認 →</button>
          </div>
        </div>
      )}

      {/* 跟團填資料 */}
      {(joinStep===2||joinStep===4)&&(
        <div style={S.card}>
          <h3 style={{fontWeight:700,fontSize:15,marginBottom:14,color:joinStep===4?"#fbbf24":"#38bdf8"}}>{joinStep===4?"⏳ 加入候補名單":"🙋 填寫跟團資料"}</h3>
          {joinStep===4&&<div style={{fontSize:12,color:"#fbbf24",marginBottom:12,background:"#1a1205",border:"1px solid #fbbf2433",borderRadius:8,padding:10}}>此活動已額滿，你將被加入候補。當有人退出，主揪會聯繫並將你遞補上正式名單。</div>}
          <div style={{marginBottom:14}}><F label="姓名" required><input style={S.input} placeholder="你的名字" value={name} onChange={e=>setName(e.target.value)}/>{isExisting&&<div style={{fontSize:11,color:"#fbbf24",marginTop:4}}>⚠ 此名字已有記錄，送出後會覆蓋</div>}</F></div>
          <div style={S.g2}>
            <F label="信箱" required hint="僅供活動通知"><input type="email" style={S.input} placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)}/></F>
            <F label="聯絡方式" hint="選填"><input style={S.input} placeholder="IG / Line ID" value={contact} onChange={e=>setContact(e.target.value)}/></F>
          </div>
          <label style={S.label}>可以的時間 <span style={{fontWeight:400,fontSize:10,color:"#374a5e"}}>(點格子切換)</span></label>
          <SlotPicker dates={dates} mySlots={slots} setMySlots={setSlots} organizerSlots={group.organizerSlots||{}} otherJoiners={Object.fromEntries(Object.entries(joiners).filter(([n])=>n!==name.trim()))} restrictToOrganizer/>
          <div style={{height:14}}/>
          <F label="備註" hint="選填，想跟主揪說的話"><textarea style={S.textarea} placeholder="例：我會晚到、會帶朋友、有食物過敏…" value={note} onChange={e=>setNote(e.target.value)}/></F>
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button style={S.btn("ghost")} onClick={()=>setJoinStep(0)}>← 返回</button>
            <button style={{...S.btn(joinStep===4?"warning":"success"),flex:1,opacity:submitting?0.6:1}} onClick={joinStep===4?submitWaitlist:submitJoin} disabled={submitting}>{submitting?"送出中…":(joinStep===4?"⏳ 加入候補":"🙌 送出跟團！")}</button>
          </div>
        </div>
      )}

      {/* 已成團報名 */}
      {joinStep===3&&(
        <div style={S.card}>
          <h3 style={{fontWeight:700,fontSize:15,marginBottom:14,color:"#34d399"}}>🎉 報名參加</h3>
          <div style={{marginBottom:14}}><F label="姓名" required><input style={S.input} placeholder="你的名字" value={name} onChange={e=>setName(e.target.value)}/></F></div>
          <div style={{marginBottom:14}}><F label="信箱" required hint="僅供活動通知"><input type="email" style={S.input} placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)}/></F></div>
          <F label="聯絡方式" required hint="如 IG、Line ID"><input style={S.input} placeholder="IG / Line ID" value={contact} onChange={e=>setContact(e.target.value)}/></F>
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button style={S.btn("ghost")} onClick={()=>setJoinStep(0)}>← 返回</button>
            <button style={{...S.btn("success"),flex:1,opacity:submitting?0.6:1}} onClick={submitRegister} disabled={submitting}>{submitting?"送出中…":"🎉 確認報名！"}</button>
          </div>
        </div>
      )}

      {/* 分享活動 */}
      <SharePanel gid={gid} group={group}/>

      {/* 留言板 */}
      <CommentBoard gid={gid} group={group}/>
    </div>);
  };

  // ── SharePanel ──
  const SharePanel=({gid,group})=>{
    const [open,setOpen]=useState(false);
    const [qrUrl,setQrUrl]=useState("");
    const url=buildShareUrl(gid);
    const title=group?.activityName||"揪團";
    const text=buildShareText(group,url);
    const targets=shareTargets(url,text,title);
    const doNativeShare=async()=>{
      if(navigator.share){
        try{await navigator.share({title,text,url});}catch{}
      }else{
        const ok=await copyToClipboard(url);
        showToast(ok?"📋 已複製連結":"❌ 複製失敗");
      }
    };
    const openTarget=(u)=>window.open(u,"_blank","noopener,noreferrer");
    const genQR=async()=>{
      if(!window.QRCode){showToast("❌ QR 套件載入中…");return;}
      try{
        const dataUrl=await QRCode.toDataURL(url,{width:480,margin:2,color:{dark:"#080d18",light:"#ffffff"}});
        setQrUrl(dataUrl);
      }catch{showToast("❌ QR 產生失敗");}
    };
    // 產生 IG Stories 圖卡 (1080x1920)
    const makeStoryCard=async()=>{
      if(!window.QRCode){showToast("❌ QR 套件載入中…");return;}
      try{
        const qrData=await QRCode.toDataURL(url,{width:640,margin:2,color:{dark:"#080d18",light:"#ffffff"}});
        const img=new Image();
        img.onload=()=>{
          const c=document.createElement("canvas");
          c.width=1080; c.height=1920;
          const ctx=c.getContext("2d");
          // 背景漸層
          const grad=ctx.createLinearGradient(0,0,1080,1920);
          grad.addColorStop(0,"#080d18"); grad.addColorStop(1,"#0f1729");
          ctx.fillStyle=grad; ctx.fillRect(0,0,1080,1920);
          // 裝飾光暈
          ctx.fillStyle="rgba(56,189,248,0.08)";
          ctx.beginPath(); ctx.arc(900,300,260,0,Math.PI*2); ctx.fill();
          ctx.fillStyle="rgba(167,139,250,0.08)";
          ctx.beginPath(); ctx.arc(180,1600,300,0,Math.PI*2); ctx.fill();
          // 標題
          ctx.fillStyle="#38bdf8"; ctx.font="900 90px system-ui,sans-serif"; ctx.textAlign="center";
          ctx.fillText("🎯 JoinUp",540,260);
          ctx.fillStyle="#dde8f5"; ctx.font="700 60px system-ui,sans-serif";
          ctx.fillText("揪團中 · 來加入！",540,360);
          // 卡片背景
          ctx.fillStyle="rgba(8,13,24,0.6)";
          ctx.strokeStyle="#38bdf8"; ctx.lineWidth=4;
          const cx=90,cy=460,cw=900,ch=520;
          if(ctx.roundRect){ctx.beginPath();ctx.roundRect(cx,cy,cw,ch,30);ctx.fill();ctx.stroke();}
          else{ctx.fillRect(cx,cy,cw,ch);ctx.strokeRect(cx,cy,cw,ch);}
          // 活動名稱
          ctx.fillStyle="#dde8f5"; ctx.font="800 62px system-ui,sans-serif"; ctx.textAlign="center";
          const name=(group.activityName||"揪團活動").slice(0,14);
          ctx.fillText(name,540,590);
          // 活動資訊
          ctx.fillStyle="#8aaac8"; ctx.font="400 38px system-ui,sans-serif";
          const date=group.confirmed?.finalDate||group.dateStart||"";
          if(date) ctx.fillText("📅 "+date,540,680);
          if(group.location) ctx.fillText("📍 "+group.location.slice(0,18),540,750);
          if(group.name) ctx.fillText("👤 主揪："+group.name,540,820);
          if(group.maxPeople) ctx.fillText("👥 上限 "+group.maxPeople+" 人",540,890);
          // QR Code
          ctx.fillStyle="#ffffff";
          if(ctx.roundRect){ctx.beginPath();ctx.roundRect(340,1080,400,400,20);ctx.fill();}
          else ctx.fillRect(340,1080,400,400);
          ctx.drawImage(img,360,1100,360,360);
          ctx.fillStyle="#bae6fd"; ctx.font="600 36px system-ui,sans-serif"; ctx.textAlign="center";
          ctx.fillText("👉 掃 QR Code 加入揪團",540,1560);
          // 底部網址
          ctx.fillStyle="#38bdf8"; ctx.font="700 34px system-ui,sans-serif";
          ctx.fillText("joinup.futurestarai.com",540,1820);
          // 下載
          const link=document.createElement("a");
          link.href=c.toDataURL("image/png");
          link.download=`JoinUp_${gid}_story.png`;
          document.body.appendChild(link); link.click();
          setTimeout(()=>document.body.removeChild(link),100);
          showToast("🖼 已下載 IG Stories 圖卡！");
        };
        img.onerror=()=>showToast("❌ QR 圖載入失敗");
        img.src=qrData;
      }catch{showToast("❌ 圖卡產生失敗");}
    };
    const btn=(bg,label,onClick)=>(
      <button onClick={onClick} style={{padding:"10px 14px",borderRadius:10,border:"none",background:bg,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",flex:"1 1 auto",minWidth:120}}>{label}</button>
    );
    return(
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setOpen(p=>!p)}>
          <h3 style={{...S.sT,margin:0}}>📤 分享活動</h3>
          <span style={{color:"#38bdf8",fontSize:14}}>{open?"▲ 收起":"▼ 展開"}</span>
        </div>
        {open&&(
          <div style={{marginTop:14}}>
            <button style={{...S.btn("primary"),width:"100%",marginBottom:12}} onClick={doNativeShare}>📱 手機一鍵分享（IG / LINE / FB…）</button>
            <div style={{fontSize:11,color:"#6b8aa8",marginBottom:10}}>桌機使用者請選下方按鈕：</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}}>
              {btn("#06C755","💚 LINE",()=>openTarget(targets.line))}
              {btn("#1877F2","📘 Facebook",()=>openTarget(targets.fb))}
              {btn("#000000","🐦 Twitter / X",()=>openTarget(targets.twitter))}
              {btn("#000000","🧵 Threads",()=>openTarget(targets.threads))}
              {btn("#25D366","💬 WhatsApp",()=>openTarget(targets.whatsapp))}
              {btn("#0088CC","✈️ Telegram",()=>openTarget(targets.telegram))}
              {btn("#6b8aa8","📧 Email",()=>openTarget(targets.email))}
              {btn("#38bdf8","📋 複製連結",async()=>{const ok=await copyToClipboard(url);showToast(ok?"📋 已複製！":"❌ 複製失敗");})}
            </div>
            <hr style={S.hr}/>
            <div style={{fontWeight:700,fontSize:13,color:"#a78bfa",marginBottom:10}}>🎨 Instagram 專屬</div>
            <div style={{fontSize:11,color:"#6b8aa8",marginBottom:10}}>IG 不支援直接分享連結，可下載圖卡貼到 IG Stories / Post</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              {btn("#E1306C","📸 下載 IG Stories 圖卡",makeStoryCard)}
              {btn("#6b8aa8","🔲 只看 QR Code",genQR)}
            </div>
            {qrUrl&&(
              <div style={{textAlign:"center",marginTop:14,background:"#fff",padding:16,borderRadius:12}}>
                <img src={qrUrl} alt="QR" style={{width:220,height:220,display:"block",margin:"0 auto"}}/>
                <div style={{fontSize:11,color:"#080d18",marginTop:8,fontWeight:600}}>掃 QR Code 進入活動</div>
              </div>
            )}
          </div>
        )}
      </div>
    );
  };

  // ── 留言板 ──
  const CommentBoard=({gid,group})=>{
    const [cName,setCName]=useState("");
    const [cText,setCText]=useState("");
    const [posting,setPosting]=useState(false);
    const comments=group.comments||[];
    const post=async()=>{
      if(!cName.trim()){showToast("❗ 請填寫名字");return;}
      if(!cText.trim()){showToast("❗ 請填寫留言");return;}
      setPosting(true);
      const latest=await getLatestSafe();
      const lg=latest[gid]; if(!lg){setPosting(false);return;}
      const next={...latest,[gid]:{...lg,comments:[...(lg.comments||[]),{name:cName.trim(),text:cText.trim(),time:Date.now()}]}};
      await saveGroups(next);
      setCText(""); setPosting(false); showToast("💬 已留言");
    };
    return(
      <div style={S.card}>
        <h3 style={{...S.sT}}>💬 活動討論區（{comments.length}）</h3>
        <div style={S.g2}>
          <F label="你的名字"><input style={S.input} placeholder="暱稱" value={cName} onChange={e=>setCName(e.target.value)}/></F>
          <div></div>
        </div>
        <F label="留言內容"><textarea style={S.textarea} placeholder="想說什麼…" value={cText} onChange={e=>setCText(e.target.value)}/></F>
        <button style={{...S.btn("primary"),marginTop:10,opacity:posting?0.6:1}} onClick={post} disabled={posting}>{posting?"送出中…":"💬 送出留言"}</button>
        <div style={{marginTop:16}}>
          {comments.length===0&&<p style={{fontSize:13,color:"#374a5e"}}>還沒有人留言，搶先發言吧</p>}
          {[...comments].sort((a,b)=>b.time-a.time).map((c,i)=>(
            <div key={i} style={{background:"#080d18",border:"1px solid #1e2d45",borderRadius:10,padding:12,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontWeight:700,fontSize:13,color:"#38bdf8"}}>{c.name}</span>
                <span style={{fontSize:11,color:"#374a5e"}}>{new Date(c.time).toLocaleString("zh-TW")}</span>
              </div>
              <div style={{fontSize:13,color:"#dde8f5",whiteSpace:"pre-wrap"}}>{c.text}</div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ── ADMIN ──
  const AdminTab=()=>{
    const [step,setStep]=useState(1);
    const [gid,setGid]=useState(""), [pw,setPw]=useState(""), [authedId,setAuthedId]=useState(null);
    const [editGroup,setEditGroup]=useState(null),[editJoiner,setEditJoiner]=useState(null),[editSlots,setEditSlots]=useState({});
    const [editingOrgSlots,setEditingOrgSlots]=useState(false),[orgSlotsDraft,setOrgSlotsDraft]=useState({});
    const [editingConfirmed,setEditingConfirmed]=useState(false);
    const [confirmedDraft,setConfirmedDraft]=useState({finalDate:"",finalSlot:"",finalLocation:"",allowJoin:true});

    const login=async()=>{
      const id=gid.trim().toLowerCase(),g=groups[id];
      if(!g){showToast("❌ 找不到此開團編號");return;}
      if(!(await matchPw(pw,g.password))){showToast("❌ 密碼錯誤");return;}
      // 若舊明文密碼成功登入，升級為 Hash
      if(!isHash(g.password)){
        const hashed=await sha256(pw);
        const next={...groups,[id]:{...g,password:hashed}};
        await saveGroups(next);
      }
      setAuthedId(id);setEditGroup({...g});setStep(2);
    };
    const group=authedId?groups[authedId]:null;
    const dates=group?getDates(group):null;
    const saveGroupInfo=async()=>{
      // 先抓最新資料，避免覆蓋到最新的跟團者 / 候補 / 留言
      const latest=await getLatestSafe();
      const latestGroup=latest[authedId]||groups[authedId]||{};
      const merged={
        ...latestGroup,
        ...editGroup,
        // 這些欄位一律用最新的，不用 editGroup 的舊快照
        joiners:latestGroup.joiners||{},
        waitlist:latestGroup.waitlist||{},
        comments:latestGroup.comments||[],
        organizerSlots:latestGroup.organizerSlots||editGroup.organizerSlots||{},
      };
      const next={...latest,[authedId]:merged};
      await saveGroups(next);
      setEditGroup({...merged});
      showToast("✅ 已更新");
    };
    const deleteGroup=async()=>{if(!window.confirm(`確定刪除「${group?.activityName}」？`))return;const latest=await getLatestSafe();const next={...latest};delete next[authedId];await saveGroups(next);setStep(1);setAuthedId(null);showToast("🗑 已刪除");};
    const deleteJoiner=async(name)=>{const latest=await getLatestSafe();const lg=latest[authedId];if(!lg)return;const nj={...(lg.joiners||{})};delete nj[name];const next={...latest,[authedId]:{...lg,joiners:nj}};await saveGroups(next);showToast(`🗑 已刪除 ${name}`);};
    const openEditJoiner=(name)=>{const data=groups[authedId].joiners[name];setEditJoiner({name,note:data.note||""});setEditSlots({...(data.slots||{})});};
    const saveJoiner=async()=>{
      const latest=await getLatestSafe();
      const lg=latest[authedId]; if(!lg)return;
      const nj={...(lg.joiners||{}),[editJoiner.name]:{...(lg.joiners?.[editJoiner.name]||{}),slots:editSlots,note:editJoiner.note}};
      const next={...latest,[authedId]:{...lg,joiners:nj}};
      await saveGroups(next); setEditJoiner(null); showToast("✅ 已更新");
    };
    const set=(k,v)=>setEditGroup(p=>({...p,[k]:v}));
    const [imgLoadingAdm,setImgLoadingAdm]=useState(false);
    const onPickImgAdm=async(e)=>{
      const file=e.target.files?.[0]; e.target.value="";
      if(!file)return;
      if(file.size>10*1024*1024){showToast("❌ 圖片太大（>10MB）");return;}
      const current=getImages(editGroup);
      if(current.length>=3){showToast("❌ 最多 3 張圖片");return;}
      setImgLoadingAdm(true);
      try{const dataUrl=await compressImage(file,700,0.65); set("images",[...current,dataUrl]); set("image",""); showToast("🖼 已加入圖片，記得按儲存");}
      catch{showToast("❌ 圖片處理失敗");}
      finally{setImgLoadingAdm(false);}
    };
    const openEditOrgSlots=()=>{setOrgSlotsDraft({...(groups[authedId]?.organizerSlots||{})});setEditingOrgSlots(true);};
    const saveOrgSlots=async()=>{
      const latest=await getLatestSafe();
      const latestGroup=latest[authedId]||{};
      const next={...latest,[authedId]:{...latestGroup,organizerSlots:orgSlotsDraft}};
      await saveGroups(next); setEditingOrgSlots(false); showToast("✅ 已更新時段");
    };

    // 已成案
    const markConfirmed=async()=>{
      const latest=await getLatestSafe();
      const latestGroup=latest[authedId]||{};
      const next={...latest,[authedId]:{...latestGroup,status:"confirmed",confirmed:{...confirmedDraft,confirmedAt:Date.now()}}};
      await saveGroups(next); setEditingConfirmed(false); showToast("✅ 已標記為成團！");
    };
    const unmarkConfirmed=async()=>{
      const latest=await getLatestSafe();
      const latestGroup=latest[authedId]||{};
      const next={...latest,[authedId]:{...latestGroup,status:"open",confirmed:null}};
      await saveGroups(next); showToast("✅ 已取消成團標記");
    };

    if(step===1)return(<div style={S.card}>
      <h2 style={S.sT}>🔐 開團者登入</h2>
      <div style={{marginBottom:14}}><F label="開團編號"><input style={S.input} placeholder="開團編號" value={gid} onChange={e=>setGid(e.target.value)}/></F></div>
      <div style={{marginBottom:16}}><F label="管理密碼"><input type="password" style={S.input} placeholder="管理密碼" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/></F></div>
      <button style={{...S.btn("primary"),width:"100%"}} onClick={login}>登入 →</button>
    </div>);

    if(editingOrgSlots)return(<div style={S.card}>
      <h2 style={S.sT}>📅 修改主揪時段</h2>
      {dates?<SlotPicker dates={dates} mySlots={orgSlotsDraft} setMySlots={setOrgSlotsDraft} otherJoiners={groups[authedId]?.joiners||{}}/>:<div style={{color:"#f87171",fontSize:13}}>請先設定活動日期</div>}
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <button style={S.btn("ghost")} onClick={()=>setEditingOrgSlots(false)}>← 返回</button>
        <button style={{...S.btn("success"),flex:1}} onClick={saveOrgSlots}>💾 儲存時段</button>
      </div>
    </div>);

    if(editJoiner)return(<div style={S.card}>
      <h2 style={S.sT}>✏️ 修改：{editJoiner.name}</h2>
      <SlotPicker dates={dates} mySlots={editSlots} setMySlots={setEditSlots} organizerSlots={groups[authedId]?.organizerSlots||{}} otherJoiners={Object.fromEntries(Object.entries(groups[authedId]?.joiners||{}).filter(([n])=>n!==editJoiner?.name))} restrictToOrganizer/>
      <div style={{height:14}}/>
      <F label="備註"><textarea style={S.textarea} value={editJoiner.note} onChange={e=>setEditJoiner(p=>({...p,note:e.target.value}))}/></F>
      <div style={{display:"flex",gap:10,marginTop:14}}>
        <button style={S.btn("ghost")} onClick={()=>setEditJoiner(null)}>← 返回</button>
        <button style={{...S.btn("success"),flex:1}} onClick={saveJoiner}>💾 儲存</button>
      </div>
    </div>);

    // 確定時間編輯
    if(editingConfirmed)return(<div style={S.card}>
      <h2 style={S.sT}>✅ 設定確定活動資訊</h2>
      <div style={{marginBottom:14}}><F label="確定日期" required><DateInput value={confirmedDraft.finalDate} onChange={v=>setConfirmedDraft(p=>({...p,finalDate:v}))}/></F></div>
      <div style={{marginBottom:14}}>
        <label style={S.label}>確定時段 <span style={{color:"#f87171"}}>*</span></label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {TIME_SLOTS.map(s=>(

            <div style={{fontWeight:700,fontSize:14,color:isConfirmed?"#34d399":"#dde8f5",marginBottom:3}}>{isConfirmed?"✅ 已成團":"⏳ 進行中"}</div>

                    <button type="button" onClick={()=>{const n=[...imgs];n.splice(idx,1);set("images",n);set("image","");}} style={{position:"absolute",top:6,right:6,background:"#dc2626",color:"#fff",border:"none",borderRadius:8,padding:"4px 8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕</button>
                  </div>

              <label style={{display:"block",background:"#080d18",border:"2px dashed #1e2d45",borderRadius:10,padding:"14px",textAlign:"center",cursor:"pointer",color:"#6b8aa8",fontSize:13}}>
                {imgLoadingAdm?"⏳ 處理中…":`📷 ${imgs.length>0?`再加一張（${imgs.length}/3）`:"上傳示意圖"}`}
                <input type="file" accept="image/*" onChange={onPickImgAdm} style={{display:"none"}}/>
              </label>
            )}
          </>);})()}
        </div>
        <button style={{...S.btn("success"),marginTop:12}} onClick={saveGroupInfo}>💾 儲存</button>
